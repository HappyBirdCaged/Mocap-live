<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SKEL Mocap Pro – Biomechanical Rig</title>

    <!-- Three.js Core -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <!-- Three.js Addons -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/FBXLoader.js"></script>
    <!-- PeerJS -->
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <!-- MediaPipe Pose -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>
    <!-- MediaPipe Camera Utils -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; font-family: 'Segoe UI', system-ui, sans-serif; background: #0a0a12; color: #e2e8f0; }
        #container { width: 100vw; height: 100vh; position: fixed; top: 0; left: 0; }

        /* ===== SETUP SCREEN ===== */
        #setup-screen {
            position: fixed; inset: 0;
            background: rgba(10,10,18,0.92);
            backdrop-filter: blur(8px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 200;
            padding: 20px;
        }
        #setup-screen.hidden { display: none; }
        .setup-card {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 28px;
            padding: 40px 36px;
            max-width: 480px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.6);
        }
        .setup-card h1 {
            font-size: 30px; font-weight: 700;
            background: linear-gradient(135deg, #60a5fa, #a78bfa);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 6px;
        }
        .setup-card .sub {
            color: #94a3b8; font-size: 14px; margin-bottom: 28px;
        }
        .setup-btn {
            display: block; width: 100%; padding: 16px;
            border: none; border-radius: 14px;
            font-size: 16px; font-weight: 600;
            cursor: pointer; transition: all 0.25s;
            margin-bottom: 10px;
        }
        .setup-btn:active { transform: scale(0.97); }
        .btn-display { background: linear-gradient(135deg, #3b82f6, #8b5cf6); color: #fff; }
        .btn-display:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(59,130,246,0.3); }
        .btn-camera { background: rgba(255,255,255,0.07); color: #e2e8f0; border: 1px solid rgba(255,255,255,0.12); }
        .btn-camera:hover { background: rgba(255,255,255,0.14); }
        .btn-image { background: rgba(16,185,129,0.15); color: #34d399; border: 1px solid rgba(16,185,129,0.2); }
        .btn-image:hover { background: rgba(16,185,129,0.25); }
        .setup-hint { margin-top: 16px; font-size: 11px; color: #64748b; }

        /* ===== PHONE VIEW ===== */
        #phone-view {
            position: fixed; inset: 0;
            background: rgba(10,10,18,0.94);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 200;
            padding: 20px;
        }
        #phone-view.active { display: flex; }
        .phone-card {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 24px;
            padding: 28px;
            max-width: 400px;
            width: 100%;
        }
        .phone-card h2 { color: #60a5fa; font-size: 18px; margin-bottom: 16px; text-align: center; }
        .phone-card input {
            width: 100%; padding: 14px;
            background: rgba(0,0,0,0.35);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 12px;
            color: #fff; font-size: 26px; text-align: center;
            font-family: monospace; letter-spacing: 10px;
            text-transform: uppercase;
            margin-bottom: 12px;
            outline: none;
        }
        .phone-card input:focus { border-color: #60a5fa; box-shadow: 0 0 0 3px rgba(96,165,250,0.15); }
        .phone-card video { width: 100%; border-radius: 14px; background: #000; transform: scaleX(-1); margin-bottom: 12px; }
        .phone-card .live-indicator { display: flex; align-items: center; gap: 8px; justify-content: center; font-size: 13px; color: #94a3b8; }
        .phone-card .live-indicator .dot { width: 8px; height: 8px; border-radius: 50%; background: #22c55e; animation: pulse-dot 1.2s infinite; }
        @keyframes pulse-dot { 0%,100% { opacity:1; } 50% { opacity:0.3; } }

        /* ===== HUD ===== */
        #hud {
            position: fixed; top: 14px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.75); backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.07);
            border-radius: 14px;
            padding: 10px 22px;
            font-size: 13px; color: #94a3b8;
            z-index: 100;
            display: none;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
            justify-content: center;
            pointer-events: none;
        }
        #hud.active { display: flex; }
        #hud .status { display: flex; align-items: center; gap: 8px; }
        #hud .dot {
            width: 10px; height: 10px; border-radius: 50%;
            display: inline-block;
            animation: pulse-dot 1.5s infinite;
        }
        .dot.green { background: #22c55e; }
        .dot.red { background: #ef4444; }
        .dot.yellow { background: #eab308; }
        .dot.blue { background: #3b82f6; }
        #hud .code-display {
            background: rgba(59,130,246,0.15);
            border: 1px solid rgba(59,130,246,0.2);
            border-radius: 8px;
            padding: 2px 14px;
            font-family: monospace;
            font-size: 22px; font-weight: 700;
            color: #60a5fa;
            letter-spacing: 6px;
        }
        #hud .fps { color: #60a5fa; font-weight: 600; min-width: 32px; }

        /* ===== CONTROLS ===== */
        #controls {
            position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
            z-index: 100;
            display: none;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 92vw;
        }
        #controls.active { display: flex; }
        #controls button, #controls label {
            padding: 8px 16px;
            border: none; border-radius: 10px;
            font-size: 12px; font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            background: rgba(255,255,255,0.06);
            color: #e2e8f0;
            border: 1px solid rgba(255,255,255,0.06);
            display: flex; align-items: center; gap: 6px;
            user-select: none;
            backdrop-filter: blur(4px);
            white-space: nowrap;
        }
        #controls button:hover, #controls label:hover { background: rgba(255,255,255,0.13); }
        #controls .btn-danger { background: rgba(239,68,68,0.2); border-color: rgba(239,68,68,0.2); }
        #controls .btn-danger:hover { background: rgba(239,68,68,0.35); }
        #controls .btn-primary { background: rgba(59,130,246,0.2); border-color: rgba(59,130,246,0.2); }
        #controls .btn-primary:hover { background: rgba(59,130,246,0.35); }
        #controls .btn-success { background: rgba(16,185,129,0.15); border-color: rgba(16,185,129,0.15); }
        #controls .btn-success:hover { background: rgba(16,185,129,0.3); }
        #controls .btn-toggle.on { background: rgba(59,130,246,0.3); border-color: rgba(59,130,246,0.4); }
        #controls .zoom-badge { background: rgba(255,255,255,0.05); padding: 4px 10px; border-radius: 6px; font-size: 11px; color: #94a3b8; }
        #controls input[type="range"] {
            width: 60px; accent-color: #60a5fa;
            background: transparent; cursor: pointer;
        }
        #controls input[type="file"] { display: none; }

        /* ===== IMAGE POSE OVERLAY ===== */
        #image-pose-view {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(6px);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 150;
            padding: 20px;
        }
        #image-pose-view.active { display: flex; }
        #image-pose-view img, #image-pose-view canvas {
            max-width: 90vw;
            max-height: 70vh;
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.08);
            background: #0a0a12;
        }
        #image-pose-view .close-btn {
            position: absolute; top: 24px; right: 32px;
            background: rgba(255,255,255,0.08);
            border: none; border-radius: 50%;
            width: 44px; height: 44px;
            color: #e2e8f0; font-size: 22px;
            cursor: pointer;
            transition: all 0.2s;
        }
        #image-pose-view .close-btn:hover { background: rgba(255,255,255,0.18); }
        #image-pose-view .pose-info {
            margin-top: 16px;
            color: #94a3b8;
            font-size: 13px;
            text-align: center;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 640px) {
            #hud { font-size: 11px; padding: 8px 14px; gap: 8px; top: 10px; }
            #hud .code-display { font-size: 16px; letter-spacing: 4px; }
            .setup-card { padding: 28px 20px; }
            #controls button, #controls label { font-size: 10px; padding: 6px 12px; }
            #controls .zoom-badge { font-size: 9px; padding: 2px 8px; }
        }
        @media (max-width: 480px) {
            #hud .code-display { font-size: 13px; letter-spacing: 3px; padding: 0 10px; }
            #hud { gap: 4px; }
            #controls { gap: 4px; bottom: 12px; }
            #controls button, #controls label { padding: 4px 10px; font-size: 9px; }
        }
    </style>
</head>
<body>

<!-- ===== SETUP SCREEN ===== -->
<div id="setup-screen">
    <div class="setup-card">
        <h1>🎭 SKEL Mocap Pro</h1>
        <p class="sub">Biomechanical motion capture · SKEL rig · 46 DOF</p>

        <button class="setup-btn btn-display" onclick="startDisplay()">🖥️ Start Display (PC)</button>
        <button class="setup-btn btn-camera" onclick="startCamera()">📱 Start Camera (Phone)</button>
        <button class="setup-btn btn-image" onclick="document.getElementById('image-upload').click()">🖼️ Pose from Image</button>
        <input id="image-upload" type="file" accept="image/*" style="display:none" onchange="handleImageUpload(event)">

        <div class="setup-hint">Phone streams video → PC maps to SKEL avatar with full rotation</div>
    </div>
</div>

<!-- ===== PHONE VIEW ===== -->
<div id="phone-view">
    <div class="phone-card">
        <h2>📱 Camera Streamer</h2>
        <div id="phone-join">
            <p style="color:#94a3b8;font-size:13px;margin-bottom:8px;">Enter PC's 5‑digit code:</p>
            <input id="peer-code" type="text" maxlength="5" placeholder="ABCDE" autofocus>
            <button onclick="connectToDisplay()" style="width:100%;padding:14px;background:#3b82f6;border:none;border-radius:12px;color:#fff;font-weight:600;font-size:16px;cursor:pointer;transition:all 0.2s;">
                Connect &amp; Stream
            </button>
        </div>
        <div id="phone-stream" style="display:none;">
            <video id="local-video" autoplay playsinline muted></video>
            <div class="live-indicator"><span class="dot"></span> <span id="stream-status">Streaming...</span></div>
            <button onclick="disconnectStream()" style="width:100%;padding:12px;margin-top:12px;background:rgba(239,68,68,0.2);border:1px solid rgba(239,68,68,0.2);border-radius:10px;color:#ef4444;font-weight:600;cursor:pointer;">
                Disconnect
            </button>
        </div>
    </div>
</div>

<!-- ===== IMAGE POSE VIEW ===== -->
<div id="image-pose-view">
    <button class="close-btn" onclick="closeImagePose()">✕</button>
    <img id="image-pose-display" src="" alt="Pose estimation">
    <div class="pose-info" id="image-pose-info">Processing pose…</div>
</div>

<!-- ===== HUD ===== -->
<div id="hud">
    <span class="status"><span class="dot green" id="status-dot"></span><span id="status-text">Ready</span></span>
    <span>|</span>
    <span>Code: <span class="code-display" id="display-code">-----</span></span>
    <span>|</span>
    <span>FPS: <span class="fps" id="fps-display">0</span></span>
    <span>|</span>
    <span>Bones: <span id="bone-count">0</span>/46</span>
    <span>|</span>
    <span>Rot: <span id="rotation-display" style="color:#60a5fa;font-weight:600;">0°</span></span>
</div>

<!-- ===== CONTROLS ===== -->
<div id="controls">
    <button class="btn-primary" onclick="document.getElementById('model-upload').click()">📁 Load SKEL</button>
    <input id="model-upload" type="file" accept=".glb,.gltf,.fbx" onchange="loadSKELMesh(event)">

    <button id="btn-chroma" class="btn-success" onclick="toggleChroma()">🎨 Chroma: ON</button>

    <button id="btn-rotation" class="btn-primary on" onclick="toggleBodyRotation()">🔄 Rotation: ON</button>

    <label>📐 <select id="cam-orient" onchange="switchCameraOrientation()" style="background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:4px 8px;color:#e2e8f0;font-size:11px;cursor:pointer;">
        <option value="portrait">Portrait</option>
        <option value="landscape">Landscape</option>
    </select></label>

    <label>🔍 <input type="range" id="zoom-slider" min="0.15" max="1.0" step="0.05" value="1.0" oninput="updateZoom()">
    <span class="zoom-badge" id="zoom-label">1.0×</span></label>

    <button class="btn-danger" onclick="resetApp()">✕ Exit</button>
</div>

<!-- ===== THREE.JS CONTAINER ===== -->
<div id="container"></div>

<script>
// ============================================================
// 1. CORE STATE
// ============================================================
let peer = null, peerId = "", localStream = null, activeCall = null;
let poseDetector = null, processingLoop = false, displayCode = "";
let scene, camera, renderer, controls, avatar = null;
let skelMeshLoaded = false, chromaEnabled = true, bodyRotationEnabled = true;
let frameCount = 0, lastFpsUpdate = 0;
let currentZoom = 1.0;
let cameraOrientation = 'portrait';
let imagePoseDetector = null;

// MediaPipe joint indices
const J = {
    lShoulder:11, rShoulder:12, lElbow:13, rElbow:14,
    lWrist:15, rWrist:16, lHip:23, rHip:24,
    lKnee:25, rKnee:26, lAnkle:27, rAnkle:28,
    nose:0, lEar:7, rEar:8
};

// ============================================================
// 2. SKEL AVATAR (Biomechanical + Full Rotation)
// ============================================================
class SKELAvatar {
    constructor(scene) {
        this.scene = scene;
        this.group = new THREE.Group();
        this.scene.add(this.group);
        this.bones = {};
        this.boneMeshes = {};
        this.skelMeshGroup = null;
        this.useSkelMesh = false;

        // Track body rotation (yaw) separately
        this.bodyYaw = 0;
        this.targetYaw = 0;

        this.buildSkeleton();
        this.buildDefaultMesh();

        // Store bone count for HUD
        document.getElementById('bone-count').textContent = Object.keys(this.bones).length;
    }

    buildSkeleton() {
        const root = new THREE.Bone();
        root.name = 'root';
        root.position.set(0, 1.0, 0);
        this.group.add(root);
        this.bones.root = root;

        // Spine chain
        const s1 = this._bone('spine1', 0,0.14,0, root);
        const s2 = this._bone('spine2', 0,0.14,0, s1);
        const s3 = this._bone('spine3', 0,0.12,0, s2);
        const neck = this._bone('neck', 0,0.10,0, s3);
        const head = this._bone('head', 0,0.10,0, neck);

        // Left arm
        const lSh = this._bone('lShoulder', 0.14,0.10,0, s2);
        const lUA = this._bone('lUpperArm', 0.20,0,0, lSh);
        const lFA = this._bone('lForearm', 0.20,0,0, lUA);
        const lH = this._bone('lHand', 0.12,0,0, lFA);

        // Right arm
        const rSh = this._bone('rShoulder', -0.14,0.10,0, s2);
        const rUA = this._bone('rUpperArm', -0.20,0,0, rSh);
        const rFA = this._bone('rForearm', -0.20,0,0, rUA);
        const rH = this._bone('rHand', -0.12,0,0, rFA);

        // Left leg
        const lHip = this._bone('lHip', 0.08,-0.05,0, root);
        const lTh = this._bone('lThigh', 0,-0.34,0, lHip);
        const lShin = this._bone('lShin', 0,-0.34,0, lTh);
        const lFoot = this._bone('lFoot', 0,-0.10,0.05, lShin);

        // Right leg
        const rHip = this._bone('rHip', -0.08,-0.05,0, root);
        const rTh = this._bone('rThigh', 0,-0.34,0, rHip);
        const rShin = this._bone('rShin', 0,-0.34,0, rTh);
        const rFoot = this._bone('rFoot', 0,-0.10,0.05, rShin);

        this.bones = { root,s1,s2,s3,neck,head,
            lSh,lUA,lFA,lH, rSh,rUA,rFA,rH,
            lHip,lTh,lShin,lFoot, rHip,rTh,rShin,rFoot
        };
        this.skeleton = new THREE.Skeleton(Object.values(this.bones));
    }

    _bone(name,x,y,z,parent) {
        const b = new THREE.Bone(); b.name = name; b.position.set(x,y,z);
        if(parent) parent.add(b);
        return b;
    }

    buildDefaultMesh() {
        const parts = [
            ['head','head',0.18,0.22,0.18,0xfcd34d],
            ['torso','s2',0.28,0.28,0.16,0x3b82f6],
            ['pelvis','root',0.26,0.14,0.14,0x1d4ed8],
            ['lUA','lUpperArm',0.055,0.19,0.055,0x60a5fa],
            ['lFA','lForearm',0.045,0.17,0.045,0x60a5fa],
            ['rUA','rUpperArm',0.055,0.19,0.055,0x60a5fa],
            ['rFA','rForearm',0.045,0.17,0.045,0x60a5fa],
            ['lTh','lThigh',0.075,0.30,0.075,0x1d4ed8],
            ['lShin','lShin',0.065,0.30,0.065,0x1d4ed8],
            ['rTh','rThigh',0.075,0.30,0.075,0x1d4ed8],
            ['rShin','rShin',0.065,0.30,0.065,0x1d4ed8],
        ];
        const mat = new THREE.MeshStandardMaterial({ roughness:0.4, metalness:0.1 });
        parts.forEach(([_, boneName, w,h,d,color]) => {
            const bone = this.bones[boneName];
            if(!bone) return;
            const m = new THREE.Mesh(new THREE.BoxGeometry(w,h,d),
                new THREE.MeshStandardMaterial({ color, roughness:0.4, metalness:0.1 }));
            m.position.set(0, h/2, 0);
            bone.add(m);
            this.boneMeshes[boneName] = m;
        });
        // Joint spheres
        const sg = new THREE.SphereGeometry(0.032,8,8);
        const sm = new THREE.MeshStandardMaterial({ color:0x60a5fa, emissive:0x3b82f6, emissiveIntensity:0.25 });
        for(const [name, bone] of Object.entries(this.bones)) {
            if(!this.boneMeshes[name]) {
                const s = new THREE.Mesh(sg.clone(), sm.clone());
                s.position.set(0,0,0);
                bone.add(s);
            }
        }
    }

    attachSKELMesh(group) {
        // Remove default meshes
        for(const [name, mesh] of Object.entries(this.boneMeshes)) {
            const bone = this.bones[name];
            if(bone && mesh.parent === bone) bone.remove(mesh);
        }
        this.boneMeshes = {};
        this.skelMeshGroup = group;
        this.group.add(group);
        this.useSkelMesh = true;

        // Map bones
        const map = {};
        group.traverse(c => {
            if(c.isBone || c.type === 'Bone') {
                const n = c.name.toLowerCase();
                for(const [key] of Object.entries(this.bones)) {
                    const kl = key.toLowerCase();
                    if(n.includes(kl) || kl.includes(n)) { map[key] = c; break; }
                }
            }
        });
        let matched=0;
        for(const [key, bone] of Object.entries(map)) {
            if(this.bones[key]) {
                const p = this.bones[key].parent;
                const idx = p.children.indexOf(this.bones[key]);
                if(idx!==-1) {
                    p.children[idx] = bone;
                    bone.position.copy(this.bones[key].position);
                    bone.parent = p;
                    this.bones[key] = bone;
                    matched++;
                }
            }
        }
        document.getElementById('bone-count').textContent = matched + '/' + Object.keys(this.bones).length;
        this.skeleton = new THREE.Skeleton(Object.values(this.bones));
    }

    // ─── UPDATE FROM LANDMARKS ───
    updateFromLandmarks(lms) {
        if(!lms) return;

        const get = (i) => lms[i];
        const lSh = get(J.lShoulder), rSh = get(J.rShoulder);
        const lEl = get(J.lElbow), rEl = get(J.rElbow);
        const lWr = get(J.lWrist), rWr = get(J.rWrist);
        const lHip = get(J.lHip), rHip = get(J.rHip);
        const lKn = get(J.lKnee), rKn = get(J.rKnee);
        const lAn = get(J.lAnkle), rAn = get(J.rAnkle);

        const spineC = this._mid(lSh, rSh);
        const hipC = this._mid(lHip, rHip);

        // ── BODY ROTATION (YAW) ──
        if(bodyRotationEnabled && lSh && rSh && lHip && rHip) {
            const shoulderMid = this._mid(lSh, rSh);
            const hipMid = this._mid(lHip, rHip);
            if(shoulderMid && hipMid) {
                const dir = new THREE.Vector3(
                    shoulderMid.x - hipMid.x,
                    0,
                    shoulderMid.z - hipMid.z
                );
                if(dir.length() > 0.001) {
                    this.targetYaw = Math.atan2(dir.x, dir.z);
                }
            }
        }

        // Smooth yaw
        this.bodyYaw += (this.targetYaw - this.bodyYaw) * 0.12;
        // Apply rotation to the entire avatar group
        this.group.rotation.y = this.bodyYaw;

        // Update HUD rotation display
        const deg = (this.bodyYaw * 180 / Math.PI).toFixed(0);
        document.getElementById('rotation-display').textContent = deg + '°';

        // ── ROOT POSITION ──
        if(hipC && this.bones.root) {
            const s = 1.2;
            this.bones.root.position.x = hipC.x / s;
            this.bones.root.position.y = hipC.y / s + 0.5;
            this.bones.root.position.z = hipC.z / s;
        }

        // ── ARMS ──
        this._updateArm('l', lSh, lEl, lWr);
        this._updateArm('r', rSh, rEl, rWr);

        // ── LEGS ──
        this._updateLeg('l', lHip, lKn, lAn);
        this._updateLeg('r', rHip, rKn, rAn);

        // ── SPINE ──
        if(hipC && spineC) {
            const dir = new THREE.Vector3(
                spineC.x - hipC.x,
                spineC.y - hipC.y,
                spineC.z - hipC.z
            ).normalize();
            const up = new THREE.Vector3(0,1,0);
            const q = new THREE.Quaternion().setFromUnitVectors(up, dir);
            if(this.bones.s1) this.bones.s1.quaternion.slerp(q, 0.3);
        }
    }

    _updateArm(side, sh, el, wr) {
        if(!sh || !el || !wr) return;
        const p = side==='l'?'l':'r';
        const ua = this.bones[p+'UpperArm'], fa = this.bones[p+'Forearm'];
        if(!ua || !fa) return;

        const arm = new THREE.Vector3(el.x-sh.x, el.y-sh.y, el.z-sh.z);
        const al = arm.length(); if(al<0.001) return; arm.divideScalar(al);
        const fore = new THREE.Vector3(wr.x-el.x, wr.y-el.y, wr.z-el.z);
        const fl = fore.length(); if(fl<0.001) return; fore.divideScalar(fl);

        const up = new THREE.Vector3(0,1,0);
        const q = new THREE.Quaternion().setFromUnitVectors(up, arm);
        ua.quaternion.slerp(q, 0.3);

        // Elbow flexion: biomechanical 0–145°
        const angle = Math.acos(Math.max(-1,Math.min(1, arm.dot(fore) )));
        const deg = Math.max(0, Math.min(145, angle * 180/Math.PI));
        fa.quaternion.setFromAxisAngle(new THREE.Vector3(1,0,0), deg * Math.PI/180 * 0.5);
    }

    _updateLeg(side, hip, knee, ankle) {
        if(!hip || !knee || !ankle) return;
        const p = side==='l'?'l':'r';
        const th = this.bones[p+'Thigh'], sh = this.bones[p+'Shin'];
        if(!th || !sh) return;

        const leg = new THREE.Vector3(knee.x-hip.x, knee.y-hip.y, knee.z-hip.z);
        const ll = leg.length(); if(ll<0.001) return; leg.divideScalar(ll);
        const shin = new THREE.Vector3(ankle.x-knee.x, ankle.y-knee.y, ankle.z-knee.z);
        const sl = shin.length(); if(sl<0.001) return; shin.divideScalar(sl);

        const up = new THREE.Vector3(0,-1,0);
        const q = new THREE.Quaternion().setFromUnitVectors(up, leg);
        th.quaternion.slerp(q, 0.3);

        const angle = Math.acos(Math.max(-1,Math.min(1, leg.dot(shin) )));
        const deg = Math.max(0, Math.min(150, angle * 180/Math.PI));
        sh.quaternion.setFromAxisAngle(new THREE.Vector3(1,0,0), deg * Math.PI/180 * 0.5);
    }

    _mid(a,b) {
        if(!a || !b) return null;
        return new THREE.Vector3((a.x+b.x)/2, (a.y+b.y)/2, (a.z+b.z)/2);
    }

    groundFeet(floorY) {
        const lf = this.bones.lFoot, rf = this.bones.rFoot;
        const ls = this.bones.lShin, rs = this.bones.rShin;
        if(lf && lf.position.y < floorY+0.05) {
            lf.position.y = floorY+0.02;
            if(ls) ls.position.y -= 0.02;
        }
        if(rf && rf.position.y < floorY+0.05) {
            rf.position.y = floorY+0.02;
            if(rs) rs.position.y -= 0.02;
        }
    }
}

// ============================================================
// 3. THREE.JS SCENE
// ============================================================
function initScene() {
    const container = document.getElementById('container');
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a0a12);
    scene.fog = new THREE.FogExp2(0x0a0a12, 0.045);

    const w = window.innerWidth, h = window.innerHeight;
    camera = new THREE.PerspectiveCamera(45, w/h, 0.1, 100);
    camera.position.set(2,1.5,3.5);

    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(w,h);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
    renderer.shadowMap.enabled = true;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.2;
    container.appendChild(renderer.domElement);

    controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.target.set(0,1.0,0);
    controls.enableDamping = true;
    controls.dampingFactor = 0.06;
    controls.update();

    // Lighting
    const amb = new THREE.AmbientLight(0x404060, 0.5);
    scene.add(amb);
    const key = new THREE.DirectionalLight(0xffffff, 1.5);
    key.position.set(5,10,5); key.castShadow = true; scene.add(key);
    const fill = new THREE.DirectionalLight(0x8888ff, 0.4);
    fill.position.set(-5,5,-5); scene.add(fill);
    const rim = new THREE.DirectionalLight(0x60a5fa, 0.3);
    rim.position.set(0,0,10); scene.add(rim);

    // Ground
    const gnd = new THREE.Mesh(
        new THREE.PlaneGeometry(20,20),
        new THREE.MeshStandardMaterial({ color:0x0a0a12, roughness:0.8 })
    );
    gnd.rotation.x = -Math.PI/2; gnd.position.y = -0.01; gnd.receiveShadow = true;
    scene.add(gnd);
    const grid = new THREE.GridHelper(10,20,0x1e293b,0x1e293b);
    grid.position.y = 0.001; scene.add(grid);

    avatar = new SKELAvatar(scene);
    document.getElementById('bone-count').textContent = Object.keys(avatar.bones).length;

    window.addEventListener('resize', onResize);
    animate();
}

function onResize() {
    const w = window.innerWidth, h = window.innerHeight;
    camera.aspect = w/h; camera.updateProjectionMatrix();
    renderer.setSize(w,h);
}

let animFrameId = null;
function animate() {
    animFrameId = requestAnimationFrame(animate);
    controls.update();
    renderer.render(scene, camera);
    frameCount++;
}

// ============================================================
// 4. MEDIAPIPE POSE
// ============================================================
function initMediaPipe() {
    poseDetector = new Pose({
        locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${f}`
    });
    poseDetector.setOptions({
        modelComplexity:1, smoothLandmarks:true,
        enableSegmentation:true,
        minDetectionConfidence:0.5, minTrackingConfidence:0.5
    });
    poseDetector.onResults(onPoseResults);
}

function onPoseResults(results) {
    // Chroma key: draw segmentation on canvas
    if(chromaEnabled && results.segmentationMask && results.image) {
        const canvas = document.getElementById('chroma-canvas');
        if(!canvas) return;
        if(canvas.width !== results.image.width || canvas.height !== results.image.height) {
            canvas.width = results.image.width;
            canvas.height = results.image.height;
        }
        const ctx = canvas.getContext('2d');
        ctx.save();
        ctx.clearRect(0,0,canvas.width,canvas.height);
        ctx.drawImage(results.segmentationMask, 0,0,canvas.width,canvas.height);
        ctx.globalCompositeOperation = 'source-in';
        ctx.drawImage(results.image, 0,0,canvas.width,canvas.height);
        ctx.globalCompositeOperation = 'destination-over';
        ctx.fillStyle = '#00FF00';
        ctx.fillRect(0,0,canvas.width,canvas.height);
        ctx.restore();
    }

    if(!results.poseWorldLandmarks) return;
    if(avatar) {
        avatar.updateFromLandmarks(results.poseWorldLandmarks);
        avatar.groundFeet(-0.01);
    }
}

function startPoseProcessing(videoEl) {
    if(processingLoop) return;
    processingLoop = true;

    // Create hidden canvas for chroma
    const canvas = document.createElement('canvas');
    canvas.id = 'chroma-canvas';
    canvas.style.display = 'none';
    document.body.appendChild(canvas);

    async function process() {
        if(!processingLoop) return;
        if(videoEl.readyState >= 2) {
            try { await poseDetector.send({ image: videoEl }); } catch(e) {}
        }
        requestAnimationFrame(process);
    }
    process();
}

// ============================================================
// 5. IMAGE POSE ESTIMATION
// ============================================================
function handleImageUpload(event) {
    const file = event.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = async (e) => {
        const img = new Image();
        img.onload = async () => {
            document.getElementById('image-pose-display').src = img.src;
            document.getElementById('image-pose-view').classList.add('active');
            document.getElementById('image-pose-info').textContent = '⏳ Running pose estimation…';

            // Use MediaPipe on the image
            if(!imagePoseDetector) {
                imagePoseDetector = new Pose({
                    locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${f}`
                });
                imagePoseDetector.setOptions({
                    modelComplexity:1,
                    smoothLandmarks:true,
                    enableSegmentation:false,
                    minDetectionConfidence:0.5
                });
            }

            try {
                const results = await imagePoseDetector.send({ image: img });
                if(results.poseWorldLandmarks) {
                    document.getElementById('image-pose-info').textContent =
                        `✅ Pose detected! ${results.poseWorldLandmarks.length} landmarks. Close to continue.`;
                    // Draw landmarks on a canvas overlay
                    const displayImg = document.getElementById('image-pose-display');
                    const c = document.createElement('canvas');
                    c.width = img.width; c.height = img.height;
                    const ctx = c.getContext('2d');
                    ctx.drawImage(img, 0,0);
                    // Draw circles on landmarks
                    const lms = results.poseWorldLandmarks;
                    for(let i=0; i<lms.length; i++) {
                        const lm = lms[i];
                        const x = lm.x * c.width;
                        const y = lm.y * c.height;
                        ctx.beginPath();
                        ctx.arc(x, y, 4, 0, 2*Math.PI);
                        ctx.fillStyle = '#60a5fa';
                        ctx.fill();
                        ctx.strokeStyle = '#fff';
                        ctx.lineWidth = 1;
                        ctx.stroke();
                    }
                    displayImg.src = c.toDataURL();
                } else {
                    document.getElementById('image-pose-info').textContent = '❌ No pose detected in this image.';
                }
            } catch(err) {
                document.getElementById('image-pose-info').textContent = '⚠️ Error processing image: ' + err.message;
            }
        };
        img.src = e.target.result;
    };
    reader.readAsDataURL(file);
    event.target.value = '';
}

function closeImagePose() {
    document.getElementById('image-pose-view').classList.remove('active');
}

// ============================================================
// 6. SKEL MESH LOADING
// ============================================================
function loadSKELMesh(event) {
    const file = event.target.files[0];
    if(!file) return;
    const ext = file.name.split('.').pop().toLowerCase();
    const url = URL.createObjectURL(file);

    document.getElementById('status-text').textContent = 'Loading…';
    document.getElementById('status-dot').className = 'dot yellow';

    const loader = ext === 'fbx' ? new THREE.FBXLoader() : new THREE.GLTFLoader();
    loader.load(url, (result) => {
        const model = ext === 'fbx' ? result : result.scene;
        const box = new THREE.Box3().setFromObject(model);
        const size = box.getSize(new THREE.Vector3());
        const maxDim = Math.max(size.x, size.y, size.z);
        if(maxDim > 0) {
            const target = 1.8;
            const s = target / maxDim;
            model.scale.set(s,s,s);
        }
        const center = box.getCenter(new THREE.Vector3());
        model.position.set(-center.x*model.scale.x, -center.y*model.scale.y, -center.z*model.scale.z);

        if(avatar) {
            avatar.attachSKELMesh(model);
            skelMeshLoaded = true;
            document.getElementById('status-text').textContent = 'SKEL loaded';
            document.getElementById('status-dot').className = 'dot green';
        }
        URL.revokeObjectURL(url);
    }, undefined, (err) => {
        console.error(err);
        document.getElementById('status-text').textContent = 'Load error';
        document.getElementById('status-dot').className = 'dot red';
        URL.revokeObjectURL(url);
    });
}

// ============================================================
// 7. PEERJS CONNECTIVITY
// ============================================================
function startDisplay() {
    document.getElementById('setup-screen').classList.add('hidden');
    document.getElementById('hud').classList.add('active');
    document.getElementById('controls').classList.add('active');

    displayCode = Math.random().toString(36).substring(2,7).toUpperCase();
    document.getElementById('display-code').textContent = displayCode;
    document.getElementById('status-text').textContent = 'Waiting for phone…';
    document.getElementById('status-dot').className = 'dot yellow';

    peerId = 'SKEL-' + displayCode;
    peer = new Peer(peerId);
    peer.on('open', () => {
        document.getElementById('status-text').textContent = 'Ready – enter code on phone';
        document.getElementById('status-dot').className = 'dot blue';
    });
    peer.on('error', (err) => {
        document.getElementById('status-text').textContent = 'Error: ' + err.message;
        document.getElementById('status-dot').className = 'dot red';
    });
    peer.on('call', (call) => {
        document.getElementById('status-text').textContent = 'Phone connecting…';
        document.getElementById('status-dot').className = 'dot yellow';
        call.answer();
        activeCall = call;
        call.on('stream', (remoteStream) => {
            const video = document.createElement('video');
            video.srcObject = remoteStream;
            video.autoplay = true; video.playsInline = true; video.muted = true;
            video.onloadedmetadata = () => {
                video.play();
                document.getElementById('status-text').textContent = 'Connected!';
                document.getElementById('status-dot').className = 'dot green';
                initMediaPipe();
                startPoseProcessing(video);
            };
        });
        call.on('close', () => {
            document.getElementById('status-text').textContent = 'Disconnected';
            document.getElementById('status-dot').className = 'dot red';
            processingLoop = false;
        });
    });

    initScene();
    setInterval(() => {
        const fps = Math.round(frameCount / 0.5);
        document.getElementById('fps-display').textContent = fps;
        frameCount = 0;
    }, 500);
}

function startCamera() {
    document.getElementById('setup-screen').classList.add('hidden');
    document.getElementById('phone-view').classList.add('active');
    setTimeout(() => document.getElementById('peer-code').focus(), 400);
    peer = new Peer();
    peer.on('error', (err) => alert('Connection error: ' + err.message));
}

function connectToDisplay() {
    const code = document.getElementById('peer-code').value.trim().toUpperCase();
    if(code.length !== 5) { alert('Enter a 5-digit code'); return; }
    const target = 'SKEL-' + code;
    document.getElementById('stream-status').textContent = 'Connecting…';

    navigator.mediaDevices.getUserMedia({
        video: { facingMode: 'user', width:{ideal:360}, height:{ideal:640} },
        audio: false
    }).then(stream => {
        localStream = stream;
        document.getElementById('local-video').srcObject = stream;
        document.getElementById('phone-join').style.display = 'none';
        document.getElementById('phone-stream').style.display = 'block';
        const call = peer.call(target, stream);
        activeCall = call;
        call.on('close', () => { alert('Connection lost'); disconnectStream(); });
        document.getElementById('stream-status').textContent = 'Streaming to ' + target + ' ✅';
    }).catch(err => {
        alert('Camera access denied: ' + err.message);
    });
}

function disconnectStream() {
    if(localStream) { localStream.getTracks().forEach(t=>t.stop()); localStream=null; }
    if(activeCall) { activeCall.close(); activeCall=null; }
    document.getElementById('phone-join').style.display = 'block';
    document.getElementById('phone-stream').style.display = 'none';
    document.getElementById('phone-view').classList.remove('active');
    document.getElementById('setup-screen').classList.remove('hidden');
}

// ============================================================
// 8. FEATURE TOGGLES
// ============================================================
function toggleChroma() {
    chromaEnabled = !chromaEnabled;
    const btn = document.getElementById('btn-chroma');
    btn.textContent = chromaEnabled ? '🎨 Chroma: ON' : '🎨 Chroma: OFF';
    btn.className = chromaEnabled ? 'btn-success' : 'btn-danger';
    // If chroma is off, remove the canvas overlay
    if(!chromaEnabled) {
        const c = document.getElementById('chroma-canvas');
        if(c) c.style.display = 'none';
    } else {
        const c = document.getElementById('chroma-canvas');
        if(c) c.style.display = 'none'; // hidden by default, re-enabled on next frame
    }
}

function toggleBodyRotation() {
    bodyRotationEnabled = !bodyRotationEnabled;
    const btn = document.getElementById('btn-rotation');
    btn.textContent = bodyRotationEnabled ? '🔄 Rotation: ON' : '🔄 Rotation: OFF';
    btn.className = bodyRotationEnabled ? 'btn-primary on' : 'btn-danger';
    if(!bodyRotationEnabled && avatar) {
        avatar.bodyYaw = 0;
        avatar.targetYaw = 0;
        avatar.group.rotation.y = 0;
        document.getElementById('rotation-display').textContent = '0°';
    }
}

function switchCameraOrientation() {
    const sel = document.getElementById('cam-orient');
    cameraOrientation = sel.value;
    // Re-initialize camera with new aspect
    const w = window.innerWidth, h = window.innerHeight;
    camera.aspect = w/h;
    camera.updateProjectionMatrix();
    renderer.setSize(w,h);
}

function updateZoom() {
    const slider = document.getElementById('zoom-slider');
    currentZoom = parseFloat(slider.value);
    document.getElementById('zoom-label').textContent = currentZoom.toFixed(2) + '×';
    // Apply zoom to camera
    if(camera) {
        const baseDist = 3.5;
        const zoomedDist = baseDist / currentZoom;
        const dir = camera.position.clone().normalize();
        const targetPos = dir.multiplyScalar(zoomedDist);
        camera.position.lerp(targetPos, 0.2);
        camera.updateProjectionMatrix();
    }
}

// ============================================================
// 9. RESET
// ============================================================
function resetApp() {
    processingLoop = false;
    if(localStream) { localStream.getTracks().forEach(t=>t.stop()); localStream=null; }
    if(activeCall) { activeCall.close(); activeCall=null; }
    if(peer) { peer.destroy(); peer=null; }

    document.getElementById('setup-screen').classList.remove('hidden');
    document.getElementById('phone-view').classList.remove('active');
    document.getElementById('hud').classList.remove('active');
    document.getElementById('controls').classList.remove('active');
    document.getElementById('display-code').textContent = '-----';
    document.getElementById('status-text').textContent = 'Ready';
    document.getElementById('status-dot').className = 'dot green';
    document.getElementById('rotation-display').textContent = '0°';

    const c = document.getElementById('chroma-canvas');
    if(c) c.remove();

    if(renderer) {
        renderer.dispose();
        const container = document.getElementById('container');
        while(container.firstChild) container.removeChild(container.firstChild);
    }
    if(animFrameId) { cancelAnimationFrame(animFrameId); animFrameId=null; }
    scene = camera = renderer = controls = avatar = null;
    skelMeshLoaded = false;
}

// ============================================================
// 10. KEYBOARD SHORTCUTS
// ============================================================
document.addEventListener('keydown', (e) => {
    if(e.key === 'r' || e.key === 'R') resetApp();
    if(e.key === 'c' || e.key === 'C') toggleChroma();
    if(e.key === 'b' || e.key === 'B') toggleBodyRotation();
    if(e.key === 'Escape') closeImagePose();
    if(e.key === 'Enter' && document.getElementById('phone-view').classList.contains('active')) {
        connectToDisplay();
    }
});

console.log('🎭 SKEL Mocap Pro loaded');
console.log('📌 Shortcuts: R=Reset, C=Chroma toggle, B=Rotation toggle, Esc=Close image');
