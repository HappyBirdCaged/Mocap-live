<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>SKEL Mocap Pro • Biomechanical</title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com">
    </script>

    <!-- fflate (required by FBXLoader) -->
    <script src="https://cdn.jsdelivr.net/npm/fflate@0.8.0/umd/index.min.js">
    </script>

    <!-- Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js">
    </script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.134.0/examples/js/controls/OrbitControls.js">
    </script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.134.0/examples/js/loaders/GLTFLoader.js">
    </script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.134.0/examples/js/loaders/FBXLoader.js">
    </script>

    <!-- PeerJS -->
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js">
    </script>

    <!-- MediaPipe -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous">
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', system_ui, sans-serif;
            background: #0a0a12;
            color: #e2e8f0;
            overflow: hidden;
        }

        #container {
            position: fixed;
            inset: 0;
            z-index: 10;
        }

        .glass {
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(148, 163, 184, 0.15);
        }

        .hud-dot {
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0.4;
            }
        }

        .setup-card {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        video {
            transform: scaleX(-1);
        }

        /* scrollable phone code input */
        #peer-code {
            letter-spacing: 8px;
        }
        #peer-code::placeholder {
            letter-spacing: 4px;
            font-size: 1.2rem;
        }

        /* image pose overlay */
        #image-pose-view .pose-overlay-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
    </style>
</head>
<body class="h-screen w-screen relative">

    <!-- ============ SETUP ============ -->
    <div id="setup-screen" class="absolute inset-0 z-50 flex items-center justify-center bg-black/90">
        <div class="setup-card glass max-w-md w-full mx-4 p-10 rounded-3xl text-center shadow-2xl">
            <div class="text-6xl mb-4">🎭</div>
            <h1 class="text-4xl font-bold bg-gradient-to-r from-blue-400 to-violet-400 bg-clip-text text-transparent mb-2">SKEL Mocap Pro</h1>
            <p class="text-slate-400 mb-8">Biomechanical 46-DOF rig • Real-time • Peer-to-Peer</p>

            <div class="space-y-3">
                <button onclick="startDisplay()"
                class="w-full py-4 bg-gradient-to-r from-blue-600 to-violet-600 hover:from-blue-500 hover:to-violet-500 rounded-2xl font-semibold text-lg transition-all active:scale-95">
                🖥️ Start Display (PC)
            </button>
            <button onclick="startCamera()"
            class="w-full py-4 bg-slate-800 hover:bg-slate-700 border border-slate-600 rounded-2xl font-semibold text-lg transition-all active:scale-95">
            📱 Start Camera (Phone)
        </button>
        <button onclick="document.getElementById('image-upload').click()"
        class="w-full py-4 bg-emerald-900/50 hover:bg-emerald-900 border border-emerald-700 rounded-2xl font-semibold text-lg transition-all active:scale-95">
        🖼️ Pose from Image
    </button>
</div>
<input id="image-upload" type="file" accept="image/*" class="hidden" onchange="handleImageUpload(event)" />
<p class="text-xs text-slate-500 mt-6">Low-latency WebRTC • MediaPipe Pose • Three.js Rig</p>
</div>
</div>

<!-- ============ PHONE VIEW ============ -->
<div id="phone-view" class="hidden absolute inset-0 z-50 bg-black/95 flex items-center justify-center p-6">
    <div class="glass max-w-sm w-full rounded-3xl p-8 relative">
        <!-- back arrow -->
        <button onclick="closePhoneView()" class="absolute top-4 left-4 text-slate-400 hover:text-white text-2xl leading-none">←</button>

        <h2 class="text-2xl font-semibold mb-6 text-center">📱 Camera Streamer</h2>

        <div id="phone-join">
            <p class="text-slate-400 text-sm mb-3">Enter PC Code</p>
            <input id="peer-code" maxlength="5"
            class="w-full text-center text-4xl font-mono bg-slate-950 border border-slate-700 rounded-2xl py-6 focus:outline-none focus:border-blue-500"
            placeholder="ABCDE" autofocus />
            <button onclick="connectToDisplay()"
            class="mt-6 w-full py-4 bg-blue-600 hover:bg-blue-500 rounded-2xl font-semibold transition-all active:scale-95">
            Connect &amp; Stream
        </button>
        <p id="phone-error" class="text-red-400 text-sm mt-3 hidden"></p>
    </div>

    <div id="phone-stream" class="hidden">
        <div class="relative rounded-2xl overflow-hidden bg-black aspect-[9/16] mb-6">
            <video id="local-video" autoplay playsinline muted class="w-full h-full object-cover"></video>
        </div>
        <div class="flex items-center justify-center gap-2 text-emerald-400 text-sm">
            <div class="w-3 h-3 bg-emerald-400 rounded-full hud-dot"></div>
            <span id="stream-status">LIVE</span>
        </div>
        <button onclick="disconnectStream()"
        class="mt-6 w-full py-3 bg-red-600/80 hover:bg-red-600 rounded-2xl text-sm font-medium transition-all">
        Disconnect
    </button>
</div>
</div>
</div>

<!-- ============ IMAGE POSE VIEW ============ -->
<div id="image-pose-view" class="hidden absolute inset-0 z-50 bg-black/90 flex flex-col items-center justify-center p-6">
    <button onclick="closeImagePose()"
    class="absolute top-6 right-6 w-12 h-12 bg-slate-800 hover:bg-slate-700 rounded-full flex items-center justify-center text-2xl z-10">
    ✕
</button>
<div class="relative max-h-[75vh] max-w-[90vw] rounded-3xl overflow-hidden shadow-2xl border border-slate-700">
    <img id="image-pose-display" class="w-auto h-auto max-h-[70vh] max-w-[90vw]" alt="" />
    <canvas id="image-pose-canvas" class="absolute inset-0 w-full h-full pointer-events-none"></canvas>
</div>
<div id="image-pose-info" class="mt-6 text-slate-400 text-center"></div>
</div>

<!-- ============ MAIN DISPLAY ============ -->
<div id="display-view" class="hidden absolute inset-0">
    <div id="container" class="w-full h-full"></div>

    <!-- HUD -->
    <div id="hud" class="hidden absolute top-6 left-1/2 -translate-x-1/2 glass px-6 py-3 rounded-3xl flex flex-wrap items-center justify-center gap-4 text-sm z-40 pointer-events-none">
        <div class="flex items-center gap-2">
            <span id="status-dot" class="w-3 h-3 bg-emerald-400 rounded-full hud-dot"></span>
            <span id="status-text" class="font-medium">Ready</span>
        </div>
        <div>Code: <span id="display-code" class="font-mono text-blue-400 font-bold text-xl tracking-widest"></span></div>
        <div>FPS: <span id="fps-display" class="font-mono text-blue-400">60</span></div>
        <div>Bones: <span id="bone-count" class="font-mono">24</span>/46</div>
        <div>Rot: <span id="rotation-display" class="font-mono text-violet-400">0°</span></div>
    </div>

    <!-- Controls -->
    <div id="controls" class="hidden absolute bottom-8 left-1/2 -translate-x-1/2 glass px-5 py-3 rounded-3xl flex flex-wrap items-center justify-center gap-3 z-40">
        <button onclick="document.getElementById('model-upload').click()"
        class="flex items-center gap-2 px-5 py-2.5 bg-slate-800 hover:bg-slate-700 rounded-2xl text-sm font-medium transition-all">
        📁 Load Model
    </button>
    <input id="model-upload" type="file" accept=".glb,.gltf,.fbx" class="hidden" onchange="loadSKELMesh(event)" />

    <button id="btn-chroma" onclick="toggleChroma()"
    class="flex items-center gap-2 px-5 py-2.5 bg-emerald-900/70 hover:bg-emerald-900 rounded-2xl text-sm font-medium transition-all">
    🎨 Chroma ON
</button>

<button id="btn-rotation" onclick="toggleBodyRotation()"
class="flex items-center gap-2 px-5 py-2.5 bg-blue-900/70 hover:bg-blue-900 rounded-2xl text-sm font-medium transition-all">
🔄 Rotation ON
</button>

<label class="flex items-center gap-2 px-4 py-2.5 bg-slate-800 rounded-2xl text-sm">
    🔍 <input type="range" id="zoom-slider" min="0.3" max="2.5" step="0.05" value="1" oninput="updateZoom()" class="accent-blue-500 w-24" />
</label>

<button onclick="resetApp()" class="px-5 py-2.5 bg-red-900/70 hover:bg-red-900 rounded-2xl text-sm font-medium transition-all">
    Exit
</button>
</div>

<!-- PiP Chroma -->
<div id="pip-container" class="hidden absolute bottom-8 right-8 w-48 h-36 bg-black rounded-3xl overflow-hidden border border-slate-700 shadow-2xl z-30">
    <canvas id="pip-canvas" class="w-full h-full object-cover"></canvas>
    <div class="absolute bottom-2 left-2 bg-black/70 text-[10px] px-2 py-px rounded">Chroma</div>
</div>
</div>

<!-- ============ SCRIPT ============ -->
<script>
    // ========================================================================
    //  CORE STATE
    // ========================================================================
    let peer = null,
        peerId = "",
        localStream = null,
        activeCall = null;
    let poseDetector = null,
        processingLoop = false,
        displayCode = "";
    let scene, camera, renderer, controls, avatar = null;
    let chromaEnabled = true,
        bodyRotationEnabled = true;
    let frameCount = 0,
        currentZoom = 1.0;
    let imagePoseDetector = null;
    let chromaCanvas = null;
    let isDisplayReady = false;

    const J = { lShoulder: 11, rShoulder: 12, lElbow: 13, rElbow: 14, lWrist: 15, rWrist: 16, lHip: 23, rHip: 24, lKnee: 25,
        rKnee: 26, lAnkle: 27, rAnkle: 28 };

    // ========================================================================
    //  SKEL AVATAR
    // ========================================================================
    class SKELAvatar {
        constructor(scene) {
            this.scene = scene;
            this.group = new THREE.Group();
            scene.add(this.group);
            this.bones = {};
            this.boneMeshes = {};
            this.bodyYaw = 0;
            this.targetYaw = 0;
            this.buildSkeleton();
            this.buildDefaultMesh();
            document.getElementById('bone-count').textContent = Object.keys(this.bones).length;
        }

        buildSkeleton() {
            const root = new THREE.Bone();
            root.name = 'root';
            root.position.set(0, 1, 0);
            this.group.add(root);
            this.bones.root = root;

            const s1 = this._bone('spine1', 0, 0.15, 0, root);
            const s2 = this._bone('spine2', 0, 0.15, 0, s1);
            const s3 = this._bone('spine3', 0, 0.12, 0, s2);
            const neck = this._bone('neck', 0, 0.10, 0, s3);
            this._bone('head', 0, 0.10, 0, neck);

            const lSh = this._bone('lShoulder', 0.15, 0.10, 0, s2);
            this._bone('lUpperArm', 0.22, 0, 0, lSh);
            this._bone('lForearm', 0.22, 0, 0, this.bones.lUpperArm);
            this._bone('lHand', 0.13, 0, 0, this.bones.lForearm);

            const rSh = this._bone('rShoulder', -0.15, 0.10, 0, s2);
            this._bone('rUpperArm', -0.22, 0, 0, rSh);
            this._bone('rForearm', -0.22, 0, 0, this.bones.rUpperArm);
            this._bone('rHand', -0.13, 0, 0, this.bones.rForearm);

            const lHip = this._bone('lHip', 0.08, -0.05, 0, root);
            this._bone('lThigh', 0, -0.36, 0, lHip);
            this._bone('lShin', 0, -0.36, 0, this.bones.lThigh);
            this._bone('lFoot', 0, -0.10, 0.06, this.bones.lShin);

            const rHip = this._bone('rHip', -0.08, -0.05, 0, root);
            this._bone('rThigh', 0, -0.36, 0, rHip);
            this._bone('rShin', 0, -0.36, 0, this.bones.rThigh);
            this._bone('rFoot', 0, -0.10, 0.06, this.bones.rShin);
        }

        _bone(name, x, y, z, parent) {
            const b = new THREE.Bone();
            b.name = name;
            b.position.set(x, y, z);
            if (parent) parent.add(b);
            this.bones[name] = b;
            return b;
        }

        buildDefaultMesh() {
            const parts = [
                ['head', 'head', 0.19, 0.23, 0.19, 0xfcd34d],
                ['torso', 'spine2', 0.29, 0.29, 0.17, 0x3b82f6],
                ['lUpperArm', 'lUpperArm', 0.06, 0.21, 0.06, 0x60a5fa],
                ['lForearm', 'lForearm', 0.05, 0.19, 0.05, 0x60a5fa],
                ['rUpperArm', 'rUpperArm', 0.06, 0.21, 0.06, 0x60a5fa],
                ['rForearm', 'rForearm', 0.05, 0.19, 0.05, 0x60a5fa],
                ['lThigh', 'lThigh', 0.08, 0.32, 0.08, 0x1e40af],
                ['lShin', 'lShin', 0.07, 0.32, 0.07, 0x1e40af],
                ['rThigh', 'rThigh', 0.08, 0.32, 0.08, 0x1e40af],
                ['rShin', 'rShin', 0.07, 0.32, 0.07, 0x1e40af],
            ];
            parts.forEach(([_, boneName, w, h, d, col]) => {
                const bone = this.bones[boneName];
                if (!bone) return;
                const mesh = new THREE.Mesh(
                    new THREE.BoxGeometry(w, h, d),
                    new THREE.MeshStandardMaterial({ color: col, roughness: 0.45, metalness: 0.1 })
                );
                mesh.position.y = h / 2;
                bone.add(mesh);
                this.boneMeshes[boneName] = mesh;
            });
        }

        attachSKELMesh(group) {
            // Remove old box meshes
            Object.values(this.boneMeshes).forEach(m => {
                if (m.parent) m.parent.remove(m);
            });
            this.boneMeshes = {};

            // Add the new model
            this.group.add(group);

            // Try to map imported bones to our skeleton
            const boneKeys = Object.keys(this.bones);
            group.traverse(c => {
                if (c.isBone) {
                    const name = c.name.toLowerCase();
                    // find best match
                    let bestKey = null;
                    let bestScore = -1;
                    for (const key of boneKeys) {
                        const k = key.toLowerCase();
                        if (name.includes(k) || k.includes(name)) {
                            const score = Math.max(name.length, k.length);
                            if (score > bestScore) {
                                bestScore = score;
                                bestKey = key;
                            }
                        }
                    }
                    if (bestKey) {
                        const orig = this.bones[bestKey];
                        if (orig && orig.parent) {
                            const idx = orig.parent.children.indexOf(orig);
                            if (idx > -1) {
                                // Preserve the child bones of the original
                                const children = orig.children.slice();
                                orig.parent.children[idx] = c;
                                // Re-parent children to the new bone
                                children.forEach(child => {
                                    if (child !== c) {
                                        c.add(child);
                                    }
                                });
                            }
                        }
                        this.bones[bestKey] = c;
                    }
                }
            });

            document.getElementById('bone-count').textContent = Object.keys(this.bones).length;
        }

        updateFromLandmarks(lms) {
            if (!lms) return;
            const get = i => lms[i];

            const lSh = get(J.lShoulder),
                rSh = get(J.rShoulder);
            const lEl = get(J.lElbow),
                rEl = get(J.rElbow);
            const lWr = get(J.lWrist),
                rWr = get(J.rWrist);
            const lHip = get(J.lHip),
                rHip = get(J.rHip);
            const lKn = get(J.lKnee),
                rKn = get(J.rKnee);
            const lAn = get(J.lAnkle),
                rAn = get(J.rAnkle);

            const hipC = this._mid(lHip, rHip);
            const spineC = this._mid(lSh, rSh);

            // Body yaw
            if (bodyRotationEnabled && lSh && rSh && lHip && rHip) {
                const dir = new THREE.Vector3().subVectors(this._mid(lSh, rSh), this._mid(lHip, rHip));
                dir.y = 0;
                if (dir.length() > 0.01) this.targetYaw = Math.atan2(dir.x, dir.z);
            }
            this.bodyYaw = this.bodyYaw * 0.88 + this.targetYaw * 0.12;
            this.group.rotation.y = this.bodyYaw;
            document.getElementById('rotation-display').textContent = Math.round(this.bodyYaw * 180 / Math.PI) + '°';

            // Root position
            if (hipC && this.bones.root) {
                this.bones.root.position.set(hipC.x * 1.1, hipC.y * 1.1 + 0.6, hipC.z * 1.1);
            }

            // Arms & legs
            this._updateArm('l', lSh, lEl, lWr);
            this._updateArm('r', rSh, rEl, rWr);
            this._updateLeg('l', lHip, lKn, lAn);
            this._updateLeg('r', rHip, rKn, rAn);

            // Spine
            if (hipC && spineC) {
                const dir = new THREE.Vector3().subVectors(spineC, hipC).normalize();
                const q = new THREE.Quaternion().setFromUnitVectors(new THREE.Vector3(0, 1, 0), dir);
                if (this.bones.spine1) {
                    this.bones.spine1.quaternion.slerp(q, 0.25);
                }
            }
        }

        _updateArm(side, sh, el, wr) {
            if (!sh || !el || !wr) return;
            const p = side === 'l' ? 'l' : 'r';
            const ua = this.bones[p + 'UpperArm'];
            const fa = this.bones[p + 'Forearm'];
            if (!ua || !fa) return;

            const armDir = new THREE.Vector3().subVectors(el, sh).normalize();
            const targetQ = new THREE.Quaternion().setFromUnitVectors(new THREE.Vector3(0, 1, 0), armDir);
            ua.quaternion.slerp(targetQ, 0.35);

            const foreDir = new THREE.Vector3().subVectors(wr, el);
            if (foreDir.length() < 0.001) return;
            const foreNorm = foreDir.clone().normalize();
            const angle = Math.acos(Math.max(-1, Math.min(1, armDir.dot(foreNorm))));
            const deg = Math.max(0, Math.min(145, angle * 180 / Math.PI));
            // FIX: use PI/180 (was PI/360)
            fa.quaternion.setFromAxisAngle(new THREE.Vector3(1, 0, 0), deg * Math.PI / 180);
        }

        _updateLeg(side, hip, knee, ankle) {
            if (!hip || !knee || !ankle) return;
            const p = side === 'l' ? 'l' : 'r';
            const th = this.bones[p + 'Thigh'];
            const sh = this.bones[p + 'Shin'];
            if (!th || !sh) return;

            const legDir = new THREE.Vector3().subVectors(knee, hip).normalize();
            const targetQ = new THREE.Quaternion().setFromUnitVectors(new THREE.Vector3(0, -1, 0), legDir);
            th.quaternion.slerp(targetQ, 0.35);

            const shinDir = new THREE.Vector3().subVectors(ankle, knee);
            if (shinDir.length() < 0.001) return;
            const shinNorm = shinDir.clone().normalize();
            const angle = Math.acos(Math.max(-1, Math.min(1, legDir.dot(shinNorm))));
            const deg = Math.max(0, Math.min(150, angle * 180 / Math.PI));
            // FIX: use PI/180 (was PI/360)
            sh.quaternion.setFromAxisAngle(new THREE.Vector3(1, 0, 0), deg * Math.PI / 180);
        }

        _mid(a, b) {
            if (!a || !b) return null;
            return new THREE.Vector3((a.x + b.x) / 2, (a.y + b.y) / 2, (a.z + b.z) / 2);
        }
    }

    // ========================================================================
    //  SCENE
    // ========================================================================
    function initScene() {
        const container = document.getElementById('container');
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a12);
        scene.fog = new THREE.FogExp2(0x0a0a12, 0.04);

        camera = new THREE.PerspectiveCamera(48, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(2.2, 1.6, 4);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        container.appendChild(renderer.domElement);

        controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.target.set(0, 1, 0);
        controls.enableDamping = true;
        controls.dampingFactor = 0.08;

        // Lights
        const ambient = new THREE.AmbientLight(0x8888aa, 0.5);
        scene.add(ambient);

        const key = new THREE.DirectionalLight(0xffffff, 1.6);
        key.position.set(6, 12, 8);
        key.castShadow = true;
        key.shadow.mapSize.width = 1024;
        key.shadow.mapSize.height = 1024;
        scene.add(key);

        const fill = new THREE.DirectionalLight(0x4488ff, 0.4);
        fill.position.set(-4, 2, -6);
        scene.add(fill);

        const rim = new THREE.DirectionalLight(0xff8844, 0.3);
        rim.position.set(0, -2, 8);
        scene.add(rim);

        // Ground
        const ground = new THREE.Mesh(
            new THREE.PlaneGeometry(40, 40),
            new THREE.MeshStandardMaterial({ color: 0x111827, roughness: 0.9, metalness: 0.1 })
        );
        ground.rotation.x = -Math.PI / 2;
        ground.position.y = -0.02;
        ground.receiveShadow = true;
        scene.add(ground);

        const grid = new THREE.GridHelper(20, 30, 0x334155, 0x1f2937);
        grid.position.y = -0.01;
        scene.add(grid);

        avatar = new SKELAvatar(scene);

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    }

    function animate() {
        requestAnimationFrame(animate);
        if (controls) controls.update();
        if (renderer && scene && camera) renderer.render(scene, camera);
        frameCount++;
    }

    // ========================================================================
    //  MEDIAPIPE
    // ========================================================================
    function initMediaPipe() {
        if (poseDetector) return;
        poseDetector = new Pose({
            locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${f}`
        });
        poseDetector.setOptions({
            modelComplexity: 1,
            smoothLandmarks: true,
            enableSegmentation: true,
            minDetectionConfidence: 0.6,
            minTrackingConfidence: 0.6
        });
        poseDetector.onResults(onPoseResults);
    }

    function onPoseResults(results) {
        // Chroma key
        if (chromaEnabled && results.segmentationMask && results.image) {
            if (!chromaCanvas) {
                chromaCanvas = document.getElementById('pip-canvas');
            }
            if (chromaCanvas) {
                const w = results.image.width;
                const h = results.image.height;
                // Keep canvas size reasonable
                const maxDim = 320;
                let dispW = w,
                    dispH = h;
                if (w > maxDim || h > maxDim) {
                    const scale = maxDim / Math.max(w, h);
                    dispW = Math.round(w * scale);
                    dispH = Math.round(h * scale);
                }
                chromaCanvas.width = dispW;
                chromaCanvas.height = dispH;
                const ctx = chromaCanvas.getContext('2d');
                ctx.clearRect(0, 0, dispW, dispH);

                // Draw the mask as alpha channel using a temp canvas
                const temp = document.createElement('canvas');
                temp.width = w;
                temp.height = h;
                const tctx = temp.getContext('2d');
                tctx.drawImage(results.segmentationMask, 0, 0);

                // Draw image with mask as alpha
                ctx.save();
                ctx.drawImage(results.image, 0, 0, dispW, dispH);
                // Use the mask as a clip region
                ctx.globalCompositeOperation = 'destination-in';
                ctx.drawImage(temp, 0, 0, dispW, dispH);
                ctx.globalCompositeOperation = 'destination-over';
                ctx.fillStyle = '#22c55e';
                ctx.fillRect(0, 0, dispW, dispH);
                ctx.restore();
            }
        }

        // Update avatar
        if (results.poseWorldLandmarks && avatar) {
            avatar.updateFromLandmarks(results.poseWorldLandmarks);
        }
    }

    function startPoseProcessing(video) {
        if (processingLoop) return;
        if (!poseDetector) {
            initMediaPipe();
            // Wait a tick for detector to initialize
            setTimeout(() => startPoseProcessing(video), 200);
            return;
        }
        processingLoop = true;
        let running = true;

        const process = async () => {
            if (!running) return;
            if (video.readyState >= 2) {
                try {
                    await poseDetector.send({ image: video });
                } catch (e) {
                    // ignore
                }
            }
            if (running) requestAnimationFrame(process);
        };
        // Store stop function
        process._stop = () => { running = false; };
        process();
    }

    // ========================================================================
    //  MODEL LOADING
    // ========================================================================
    function loadSKELMesh(e) {
        const file = e.target.files[0];
        if (!file) return;
        const url = URL.createObjectURL(file);
        const isFBX = file.name.toLowerCase().endsWith('.fbx');
        const loader = isFBX ? new THREE.FBXLoader() : new THREE.GLTFLoader();

        loader.load(url, result => {
            let model = result;
            if (!isFBX) {
                // GLTFLoader returns { scene, scenes, ... }
                model = result.scene || result;
            }
            // Center and scale
            const box = new THREE.Box3().setFromObject(model);
            const center = box.getCenter(new THREE.Vector3());
            const size = box.getSize(new THREE.Vector3());
            const scale = 1.8 / Math.max(size.x, size.y, size.z);
            model.scale.set(scale, scale, scale);
            model.position.sub(center.clone().multiplyScalar(scale));
            model.position.y += 0.1;

            if (avatar) avatar.attachSKELMesh(model);
            URL.revokeObjectURL(url);
            document.getElementById('status-text').textContent = 'Model loaded';
        }, undefined, err => {
            console.error('Load error:', err);
            document.getElementById('status-text').textContent = 'Load failed';
        });
    }

    // ========================================================================
    //  CONNECTIVITY
    // ========================================================================
    function startDisplay() {
        document.getElementById('setup-screen').classList.add('hidden');
        document.getElementById('display-view').classList.remove('hidden');
        document.getElementById('hud').classList.remove('hidden');
        document.getElementById('controls').classList.remove('hidden');

        displayCode = Math.random().toString(36).substring(2, 7).toUpperCase();
        document.getElementById('display-code').textContent = displayCode;
        document.getElementById('status-text').textContent = 'Waiting for peer...';

        // Create peer with fixed ID
        peer = new Peer('SKEL-' + displayCode);

        peer.on('open', id => {
            isDisplayReady = true;
            document.getElementById('status-text').textContent = 'Ready — share code';
            console.log('Display peer ready:', id);
        });

        peer.on('call', call => {
            document.getElementById('status-text').textContent = 'Incoming connection...';
            call.answer();
            call.on('stream', stream => {
                document.getElementById('status-text').textContent = 'Streaming';
                const video = document.createElement('video');
                video.srcObject = stream;
                video.autoplay = true;
                video.playsInline = true;
                video.muted = true;
                video.onloadedmetadata = () => {
                    video.play();
                    initMediaPipe();
                    startPoseProcessing(video);
                    document.getElementById('pip-container').classList.remove('hidden');
                    document.getElementById('status-dot').className = 'w-3 h-3 bg-emerald-400 rounded-full hud-dot';
                };
                video.onerror = () => {
                    document.getElementById('status-text').textContent = 'Video error';
                };
            });
            call.on('close', () => {
                document.getElementById('status-text').textContent = 'Disconnected';
                document.getElementById('pip-container').classList.add('hidden');
                document.getElementById('status-dot').className = 'w-3 h-3 bg-slate-500 rounded-full';
            });
        });

        peer.on('error', err => {
            console.error('Peer error:', err);
            document.getElementById('status-text').textContent = 'Error: ' + err.message;
        });

        initScene();

        // FPS counter
        setInterval(() => {
            document.getElementById('fps-display').textContent = Math.round(frameCount / 0.5);
            frameCount = 0;
        }, 500);
    }

    // ----- Phone side -----
    function startCamera() {
        document.getElementById('setup-screen').classList.add('hidden');
        document.getElementById('phone-view').classList.remove('hidden');
        document.getElementById('phone-join').classList.remove('hidden');
        document.getElementById('phone-stream').classList.add('hidden');
        document.getElementById('phone-error').classList.add('hidden');

        peer = new Peer();
        peer.on('open', id => {
            console.log('Phone peer ready:', id);
        });
        peer.on('error', err => {
            console.error('Phone peer error:', err);
            showPhoneError('Peer error: ' + err.message);
        });
    }

    function closePhoneView() {
        if (localStream) {
            localStream.getTracks().forEach(t => t.stop());
            localStream = null;
        }
        if (activeCall) {
            activeCall.close();
            activeCall = null;
        }
        document.getElementById('phone-view').classList.add('hidden');
        document.getElementById('setup-screen').classList.remove('hidden');
        document.getElementById('phone-stream').classList.add('hidden');
        document.getElementById('phone-join').classList.remove('hidden');
    }

    function showPhoneError(msg) {
        const el = document.getElementById('phone-error');
        el.textContent = msg;
        el.classList.remove('hidden');
    }

    async function connectToDisplay() {
        const code = document.getElementById('peer-code').value.trim().toUpperCase();
        if (code.length !== 5) {
            showPhoneError('Please enter exactly 5 characters');
            return;
        }

        const errorEl = document.getElementById('phone-error');
        errorEl.classList.add('hidden');

        if (!peer || peer.destroyed) {
            peer = new Peer();
            await new Promise(resolve => peer.on('open', resolve));
        }

        try {
            const stream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: "user", width: { ideal: 480 } },
                audio: false
            });
            localStream = stream;
            document.getElementById('local-video').srcObject = stream;

            const call = peer.call('SKEL-' + code, stream);
            activeCall = call;

            call.on('stream', remoteStream => {
                // Phone doesn't display remote, just keep connection
                console.log('Stream established');
            });

            call.on('close', () => {
                document.getElementById('stream-status').textContent = 'DISCONNECTED';
                document.getElementById('stream-status').className = 'text-red-400 text-sm';
            });

            // Show stream UI
            document.getElementById('phone-join').classList.add('hidden');
            document.getElementById('phone-stream').classList.remove('hidden');
            document.getElementById('stream-status').textContent = 'LIVE';
            document.getElementById('stream-status').className = 'text-emerald-400 text-sm';

        } catch (err) {
            console.error('Connection error:', err);
            showPhoneError('Camera or connection error: ' + err.message);
        }
    }

    function disconnectStream() {
        if (localStream) {
            localStream.getTracks().forEach(t => t.stop());
            localStream = null;
        }
        if (activeCall) {
            activeCall.close();
            activeCall = null;
        }
        document.getElementById('phone-stream').classList.add('hidden');
        document.getElementById('phone-join').classList.remove('hidden');
        document.getElementById('phone-error').classList.add('hidden');
        document.getElementById('peer-code').value = '';
    }

    // ========================================================================
    //  TOGGLES
    // ========================================================================
    function toggleChroma() {
        chromaEnabled = !chromaEnabled;
        const btn = document.getElementById('btn-chroma');
        btn.textContent = chromaEnabled ? '🎨 Chroma ON' : '🎨 Chroma OFF';
        if (!chromaEnabled) {
            const canvas = document.getElementById('pip-canvas');
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }
    }

    function toggleBodyRotation() {
        bodyRotationEnabled = !bodyRotationEnabled;
        const btn = document.getElementById('btn-rotation');
        btn.textContent = bodyRotationEnabled ? '🔄 Rotation ON' : '🔄 Rotation OFF';
    }

    function updateZoom() {
        currentZoom = parseFloat(document.getElementById('zoom-slider').value);
        if (camera && controls) {
            // Zoom relative to target
            const dir = new THREE.Vector3().subVectors(camera.position, controls.target);
            const dist = 4.5 / currentZoom;
            dir.normalize().multiplyScalar(dist);
            camera.position.copy(controls.target).add(dir);
            camera.lookAt(controls.target);
        }
    }

    // ========================================================================
    //  IMAGE POSE
    // ========================================================================
    function handleImageUpload(e) {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = ev => {
            const img = new Image();
            img.onload = () => {
                document.getElementById('image-pose-display').src = img.src;
                document.getElementById('image-pose-view').classList.remove('hidden');
                document.getElementById('image-pose-info').textContent = 'Detecting pose…';

                // Run MediaPipe on the image
                if (!imagePoseDetector) {
                    imagePoseDetector = new Pose({
                        locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${f}`
                    });
                    imagePoseDetector.setOptions({
                        modelComplexity: 1,
                        smoothLandmarks: true,
                        minDetectionConfidence: 0.6,
                        minTrackingConfidence: 0.6
                    });
                }

                // Draw landmarks on canvas overlay
                const canvas = document.getElementById('image-pose-canvas');
                const ctx = canvas.getContext('2d');

                imagePoseDetector.onResults(results => {
                    canvas.width = img.width;
                    canvas.height = img.height;
                    ctx.clearRect(0, 0, canvas.width, canvas.height);

                    if (results.poseLandmarks) {
                        ctx.strokeStyle = '#22c55e';
                        ctx.lineWidth = 3;
                        ctx.shadowColor = '#22c55e';
                        ctx.shadowBlur = 8;

                        const lm = results.poseLandmarks;
                        // Draw connections (simplified)
                        const connections = [
                            [11, 12],
                            [11, 13],
                            [13, 15],
                            [12, 14],
                            [14, 16],
                            [11, 23],
                            [12, 24],
                            [23, 24],
                            [23, 25],
                            [25, 27],
                            [24, 26],
                            [26, 28]
                        ];
                        connections.forEach(([i, j]) => {
                            if (lm[i] && lm[j]) {
                                ctx.beginPath();
                                ctx.moveTo(lm[i].x * canvas.width, lm[i].y * canvas.height);
                                ctx.lineTo(lm[j].x * canvas.width, lm[j].y * canvas.height);
                                ctx.stroke();
                            }
                        });
                        // Draw keypoints
                        lm.forEach(p => {
                            ctx.beginPath();
                            ctx.arc(p.x * canvas.width, p.y * canvas.height, 6, 0, 2 * Math.PI);
                            ctx.fillStyle = '#3b82f6';
                            ctx.fill();
                            ctx.shadowBlur = 12;
                        });

                        document.getElementById('image-pose-info').textContent =
                            `✅ Pose detected — ${lm.length} landmarks`;
                    } else {
                        document.getElementById('image-pose-info').textContent = '❌ No pose detected in this image';
                    }
                });

                // Send image to detector
                imagePoseDetector.send({ image: img }).catch(err => {
                    console.error('Image pose error:', err);
                    document.getElementById('image-pose-info').textContent = '⚠️ Pose detection failed';
                });

                // Also update avatar if display is active
                // (we don't have world landmarks from image, so skip avatar update)
            };
            img.src = ev.target.result;
        };
        reader.readAsDataURL(file);
        // Reset input so same file can be re-uploaded
        e.target.value = '';
    }

    function closeImagePose() {
        document.getElementById('image-pose-view').classList.add('hidden');
        const canvas = document.getElementById('image-pose-canvas');
        const ctx = canvas.getContext('2d');
        ctx.clearRect(0, 0, canvas.width, canvas.height);
    }

    // ========================================================================
    //  RESET
    // ========================================================================
    function resetApp() {
        // Clean up
        if (localStream) {
            localStream.getTracks().forEach(t => t.stop());
            localStream = null;
        }
        if (activeCall) {
            activeCall.close();
            activeCall = null;
        }
        if (peer) {
            peer.destroy();
            peer = null;
        }
        processingLoop = false;
        location.reload();
    }

    // ========================================================================
    //  KEYBOARD SHORTCUTS
    // ========================================================================
    document.addEventListener('keydown', e => {
        if (e.key.toLowerCase() === 'r') resetApp();
        if (e.key.toLowerCase() === 'c') toggleChroma();
        if (e.key.toLowerCase() === 'b') toggleBodyRotation();
        if (e.key === 'Enter' && document.getElementById('phone-view').classList.contains('hidden') === false) {
            const join = document.getElementById('phone-join');
            if (!join.classList.contains('hidden')) {
                connectToDisplay();
            }
        }
    });

    console.log('%cSKEL Mocap Pro — debugged & fixed ✅', 'color:#60a5fa;font-weight:700');
    console.log('🔧 Fixes: angle calc (π/360→π/180), zoom relative to target, chroma compositing, peer readiness, image pose overlay');
</script>
