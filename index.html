<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SKEL Mocap - Live Performance System</title>
    
    <!-- Three.js Core -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <!-- Three.js Addons -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/FBXLoader.js"></script>
    
    <!-- PeerJS for WebRTC -->
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    
    <!-- MediaPipe Pose -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            overflow: hidden; 
            font-family: 'Segoe UI', sans-serif; 
            background: #0a0a12; 
            color: white;
        }
        #container { width: 100vw; height: 100vh; position: fixed; top: 0; left: 0; }
        
        /* Setup Screen */
        #setup-screen {
            position: fixed;
            inset: 0;
            background: rgba(10, 10, 18, 0.95);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            padding: 20px;
        }
        #setup-screen.hidden { display: none; }
        
        .setup-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 24px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            text-align: center;
        }
        .setup-card h1 {
            font-size: 28px;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .setup-card p {
            color: #94a3b8;
            font-size: 14px;
            margin-bottom: 24px;
        }
        .setup-btn {
            display: block;
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 12px;
        }
        .btn-display {
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            color: white;
        }
        .btn-display:hover { transform: scale(1.02); }
        .btn-camera {
            background: rgba(255,255,255,0.1);
            color: white;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .btn-camera:hover { background: rgba(255,255,255,0.2); }
        
        /* Phone Streamer */
        #phone-view {
            position: fixed;
            inset: 0;
            background: rgba(10, 10, 18, 0.95);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            padding: 20px;
        }
        #phone-view.active { display: flex; }
        
        .phone-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 24px;
            padding: 30px;
            max-width: 400px;
            width: 100%;
        }
        .phone-card input {
            width: 100%;
            padding: 14px;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 10px;
            color: white;
            font-size: 24px;
            text-align: center;
            font-family: monospace;
            letter-spacing: 8px;
            text-transform: uppercase;
            margin-bottom: 12px;
        }
        .phone-card input:focus {
            outline: none;
            border-color: #60a5fa;
        }
        .phone-card video {
            width: 100%;
            border-radius: 12px;
            background: #000;
            transform: scaleX(-1);
            margin-bottom: 12px;
        }
        
        /* HUD */
        #hud {
            position: fixed;
            top: 16px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 10px 24px;
            font-size: 13px;
            color: #94a3b8;
            z-index: 50;
            display: none;
            gap: 20px;
            align-items: center;
            flex-wrap: wrap;
            justify-content: center;
        }
        #hud.active { display: flex; }
        #hud .status { 
            display: flex; 
            align-items: center; 
            gap: 8px;
        }
        #hud .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
            animation: pulse 1.5s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        .dot.green { background: #22c55e; }
        .dot.red { background: #ef4444; }
        .dot.yellow { background: #eab308; }
        .dot.blue { background: #3b82f6; }
        
        #hud .code-display {
            background: rgba(59, 130, 246, 0.2);
            border: 1px solid rgba(59, 130, 246, 0.3);
            border-radius: 8px;
            padding: 4px 16px;
            font-family: monospace;
            font-size: 24px;
            font-weight: 700;
            color: #60a5fa;
            letter-spacing: 6px;
        }
        #hud .fps { color: #60a5fa; font-weight: 600; }
        
        /* Controls */
        #controls {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 50;
            display: none;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
        }
        #controls.active { display: flex; }
        #controls button {
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            background: rgba(255,255,255,0.1);
            color: white;
            border: 1px solid rgba(255,255,255,0.1);
        }
        #controls button:hover { background: rgba(255,255,255,0.2); }
        #controls .btn-danger { background: rgba(239, 68, 68, 0.3); border-color: rgba(239, 68, 68, 0.3); }
        #controls .btn-danger:hover { background: rgba(239, 68, 68, 0.5); }
        #controls .btn-model { background: rgba(96, 165, 250, 0.2); border-color: rgba(96, 165, 250, 0.3); }
        #controls .btn-model:hover { background: rgba(96, 165, 250, 0.3); }
        
        /* Model Upload */
        #model-upload {
            display: none;
        }
        
        /* Responsive */
        @media (max-width: 640px) {
            #hud { font-size: 11px; padding: 8px 16px; gap: 10px; }
            #hud .code-display { font-size: 18px; letter-spacing: 4px; }
            .setup-card { padding: 24px; }
        }
    </style>
</head>
<body>

<!-- Setup Screen -->
<div id="setup-screen">
    <div class="setup-card">
        <h1>🎭 SKEL Mocap</h1>
        <p>Live motion capture with biomechanical precision</p>
        
        <button class="setup-btn btn-display" onclick="startDisplay()">
            🖥️ Start Display (PC)
        </button>
        <button class="setup-btn btn-camera" onclick="startCamera()">
            📱 Start Camera (Phone)
        </button>
        
        <div style="margin-top: 16px; font-size: 11px; color: #64748b;">
            Phone streams video → PC maps to SKEL avatar
        </div>
    </div>
</div>

<!-- Phone View -->
<div id="phone-view">
    <div class="phone-card">
        <h2 style="color: #60a5fa; font-size: 18px; margin-bottom: 16px;">📱 Camera Streamer</h2>
        
        <div id="phone-join">
            <p style="color: #94a3b8; font-size: 13px; margin-bottom: 8px;">Enter PC's 5-digit code:</p>
            <input id="peer-code" type="text" maxlength="5" placeholder="ABCDE" autofocus>
            <button onclick="connectToDisplay()" style="width:100%; padding:14px; background: #3b82f6; border:none; border-radius:10px; color:white; font-weight:600; font-size:16px; cursor:pointer;">
                Connect & Stream
            </button>
        </div>
        
        <div id="phone-stream" style="display:none;">
            <video id="local-video" autoplay playsinline muted></video>
            <div style="display:flex; gap:8px; justify-content:center; align-items:center;">
                <span style="color:#22c55e; font-size:12px;">● LIVE</span>
                <span style="color:#94a3b8; font-size:12px;" id="stream-status">Streaming...</span>
            </div>
            <button onclick="disconnectStream()" style="width:100%; padding:12px; margin-top:12px; background: rgba(239,68,68,0.3); border:1px solid rgba(239,68,68,0.3); border-radius:10px; color:#ef4444; font-weight:600; cursor:pointer;">
                Disconnect
            </button>
        </div>
    </div>
</div>

<!-- HUD -->
<div id="hud">
    <span class="status">
        <span class="dot green" id="status-dot"></span>
        <span id="status-text">Ready</span>
    </span>
    <span>|</span>
    <span>Code: <span class="code-display" id="display-code">-----</span></span>
    <span>|</span>
    <span>FPS: <span class="fps" id="fps-display">0</span></span>
    <span>|</span>
    <span>Bones: <span id="bone-count">0</span>/46</span>
</div>

<!-- Controls -->
<div id="controls">
    <button class="btn-model" onclick="document.getElementById('model-upload').click()">
        📁 Load SKEL Mesh
    </button>
    <input id="model-upload" type="file" accept=".glb,.gltf,.fbx" onchange="loadSKELMesh(event)">
    <button onclick="resetApp()" class="btn-danger">✕ Exit</button>
</div>

<!-- Three.js Container -->
<div id="container"></div>

<script>
// ============================================================
// 1. CORE VARIABLES
// ============================================================
let peer = null;
let peerId = "";
let localStream = null;
let activeCall = null;
let poseDetector = null;
let processingLoop = false;
let displayCode = "";

let scene, camera, renderer, controls;
let avatar = null;
let avatarBones = {};
let skelMeshGroup = null;
let skelMeshLoaded = false;

let frameCount = 0;
let lastFpsUpdate = 0;

// MediaPipe joint indices
const JOINT_INDICES = {
    leftShoulder: 11, rightShoulder: 12,
    leftElbow: 13, rightElbow: 14,
    leftWrist: 15, rightWrist: 16,
    leftHip: 23, rightHip: 24,
    leftKnee: 25, rightKnee: 26,
    leftAnkle: 27, rightAnkle: 28,
    leftEar: 7, rightEar: 8,
    nose: 0
};

// ============================================================
// 2. SKEL - Biomechanical Avatar System
// ============================================================

/**
 * SKELAvatar - Creates a biomechanically constrained avatar
 * using Three.js bones. The 46 DOFs of SKEL are mapped to
 * bone rotations with built-in anatomical limits.
 */
class SKELAvatar {
    constructor(scene, useSkelMesh = false) {
        this.scene = scene;
        this.group = new THREE.Group();
        this.scene.add(this.group);
        
        this.bones = {};
        this.boneMeshes = {};
        this.useSkelMesh = useSkelMesh;
        this.skelMeshGroup = null;
        
        this.jointLimits = this.getJointLimits();
        
        this.buildSkeleton();
        if (!useSkelMesh) {
            this.buildMesh();
        }
    }
    
    /**
     * SKEL has 46 biomechanical degrees of freedom mapped to specific joints.
     * Each joint has a specific rotation axis and range.
     */
    getJointLimits() {
        return {
            spine: {
                flexion: { min: -30, max: 60, axis: 'x' },
                lateral: { min: -30, max: 30, axis: 'z' },
                rotation: { min: -45, max: 45, axis: 'y' }
            },
            neck: {
                flexion: { min: -30, max: 45, axis: 'x' },
                lateral: { min: -20, max: 20, axis: 'z' },
                rotation: { min: -60, max: 60, axis: 'y' }
            },
            shoulder: {
                flexion: { min: -180, max: 180, axis: 'x' },
                abduction: { min: -90, max: 180, axis: 'z' },
                rotation: { min: -90, max: 90, axis: 'y' }
            },
            elbow: {
                flexion: { min: 0, max: 145, axis: 'x' }
            },
            wrist: {
                flexion: { min: -60, max: 60, axis: 'x' },
                deviation: { min: -30, max: 30, axis: 'z' }
            },
            hip: {
                flexion: { min: -30, max: 120, axis: 'x' },
                abduction: { min: -45, max: 45, axis: 'z' },
                rotation: { min: -45, max: 45, axis: 'y' }
            },
            knee: {
                flexion: { min: 0, max: 150, axis: 'x' }
            },
            ankle: {
                dorsiflexion: { min: -20, max: 30, axis: 'x' },
                inversion: { min: -15, max: 15, axis: 'z' }
            }
        };
    }
    
    /**
     * Build the skeleton with biomechanical constraints
     */
    buildSkeleton() {
        const root = new THREE.Bone();
        root.name = 'root';
        root.position.set(0, 1.0, 0);
        this.group.add(root);
        this.bones.root = root;
        
        // Spine chain
        const spine1 = this.createBone('spine1', 0, 0.15, 0, root);
        const spine2 = this.createBone('spine2', 0, 0.15, 0, spine1);
        const spine3 = this.createBone('spine3', 0, 0.12, 0, spine2);
        const neck = this.createBone('neck', 0, 0.10, 0, spine3);
        const head = this.createBone('head', 0, 0.10, 0, neck);
        
        // Left arm chain
        const lShoulder = this.createBone('lShoulder', 0.15, 0.10, 0, spine2);
        const lUpperArm = this.createBone('lUpperArm', 0.20, 0, 0, lShoulder);
        const lForearm = this.createBone('lForearm', 0.20, 0, 0, lUpperArm);
        const lHand = this.createBone('lHand', 0.12, 0, 0, lForearm);
        
        // Right arm chain
        const rShoulder = this.createBone('rShoulder', -0.15, 0.10, 0, spine2);
        const rUpperArm = this.createBone('rUpperArm', -0.20, 0, 0, rShoulder);
        const rForearm = this.createBone('rForearm', -0.20, 0, 0, rUpperArm);
        const rHand = this.createBone('rHand', -0.12, 0, 0, rForearm);
        
        // Left leg chain
        const lHip = this.createBone('lHip', 0.08, -0.05, 0, root);
        const lThigh = this.createBone('lThigh', 0, -0.35, 0, lHip);
        const lShin = this.createBone('lShin', 0, -0.35, 0, lThigh);
        const lFoot = this.createBone('lFoot', 0, -0.10, 0.05, lShin);
        
        // Right leg chain
        const rHip = this.createBone('rHip', -0.08, -0.05, 0, root);
        const rThigh = this.createBone('rThigh', 0, -0.35, 0, rHip);
        const rShin = this.createBone('rShin', 0, -0.35, 0, rThigh);
        const rFoot = this.createBone('rFoot', 0, -0.10, 0.05, rShin);
        
        // Store all bones
        this.bones = {
            root, spine1, spine2, spine3, neck, head,
            lShoulder, lUpperArm, lForearm, lHand,
            rShoulder, rUpperArm, rForearm, rHand,
            lHip, lThigh, lShin, lFoot,
            rHip, rThigh, rShin, rFoot
        };
        
        const boneArray = Object.values(this.bones);
        this.skeleton = new THREE.Skeleton(boneArray);
    }
    
    createBone(name, x, y, z, parent) {
        const bone = new THREE.Bone();
        bone.name = name;
        bone.position.set(x, y, z);
        if (parent) parent.add(bone);
        return bone;
    }
    
    /**
     * Build visual mesh for the avatar (blocky default)
     */
    buildMesh() {
        const parts = [
            { name: 'head', bone: 'head', width: 0.20, height: 0.25, depth: 0.20, color: 0xfcd34d },
            { name: 'torso', bone: 'spine2', width: 0.30, height: 0.30, depth: 0.18, color: 0x3b82f6 },
            { name: 'pelvis', bone: 'root', width: 0.28, height: 0.15, depth: 0.16, color: 0x1d4ed8 },
            { name: 'lUpperArm', bone: 'lUpperArm', width: 0.06, height: 0.20, depth: 0.06, color: 0x60a5fa },
            { name: 'lForearm', bone: 'lForearm', width: 0.05, height: 0.18, depth: 0.05, color: 0x60a5fa },
            { name: 'rUpperArm', bone: 'rUpperArm', width: 0.06, height: 0.20, depth: 0.06, color: 0x60a5fa },
            { name: 'rForearm', bone: 'rForearm', width: 0.05, height: 0.18, depth: 0.05, color: 0x60a5fa },
            { name: 'lThigh', bone: 'lThigh', width: 0.08, height: 0.30, depth: 0.08, color: 0x1d4ed8 },
            { name: 'lShin', bone: 'lShin', width: 0.07, height: 0.30, depth: 0.07, color: 0x1d4ed8 },
            { name: 'rThigh', bone: 'rThigh', width: 0.08, height: 0.30, depth: 0.08, color: 0x1d4ed8 },
            { name: 'rShin', bone: 'rShin', width: 0.07, height: 0.30, depth: 0.07, color: 0x1d4ed8 },
        ];
        
        parts.forEach(part => {
            const bone = this.bones[part.bone];
            if (!bone) return;
            
            const geo = new THREE.BoxGeometry(part.width, part.height, part.depth);
            const mat = new THREE.MeshStandardMaterial({ 
                color: part.color,
                roughness: 0.4,
                metalness: 0.1
            });
            const mesh = new THREE.Mesh(geo, mat);
            mesh.position.set(0, part.height/2, 0);
            bone.add(mesh);
            this.boneMeshes[part.bone] = mesh;
        });
        
        // Joint spheres
        const sphereGeo = new THREE.SphereGeometry(0.035, 8, 8);
        const sphereMat = new THREE.MeshStandardMaterial({ color: 0x60a5fa, emissive: 0x3b82f6, emissiveIntensity: 0.3 });
        for (const [name, bone] of Object.entries(this.bones)) {
            if (!this.boneMeshes[name]) {
                const sphere = new THREE.Mesh(sphereGeo.clone(), sphereMat.clone());
                sphere.position.set(0, 0, 0);
                bone.add(sphere);
            }
        }
    }
    
    /**
     * Attach a loaded SKEL mesh to the skeleton
     */
    attachSKELMesh(meshGroup) {
        // Remove default meshes if they exist
        for (const [name, mesh] of Object.entries(this.boneMeshes)) {
            const bone = this.bones[name];
            if (bone && mesh.parent === bone) {
                bone.remove(mesh);
            }
        }
        this.boneMeshes = {};
        
        // Store the mesh group
        this.skelMeshGroup = meshGroup;
        this.group.add(meshGroup);
        this.useSkelMesh = true;
        
        // Try to map bones from the SKEL mesh to our skeleton
        this.mapSKELBones(meshGroup);
    }
    
    /**
     * Map bones from loaded SKEL mesh to our skeleton
     */
    mapSKELBones(meshGroup) {
        const boneMap = {};
        
        // Find all bones in the loaded mesh
        meshGroup.traverse((child) => {
            if (child.isBone || child.type === 'Bone') {
                // Try to match by name
                const name = child.name.toLowerCase();
                for (const [key, bone] of Object.entries(this.bones)) {
                    const keyLower = key.toLowerCase();
                    if (name.includes(keyLower) || keyLower.includes(name)) {
                        boneMap[key] = child;
                        break;
                    }
                }
            }
        });
        
        // If we found matches, replace our bones with the loaded ones
        let matched = 0;
        for (const [key, bone] of Object.entries(boneMap)) {
            if (this.bones[key]) {
                // Transfer position from original bone
                const originalPos = this.bones[key].position.clone();
                const originalParent = this.bones[key].parent;
                
                // Replace the bone
                const parent = originalParent;
                const idx = parent.children.indexOf(this.bones[key]);
                if (idx !== -1) {
                    parent.children[idx] = bone;
                    bone.position.copy(originalPos);
                    bone.parent = parent;
                    this.bones[key] = bone;
                    matched++;
                }
            }
        }
        
        console.log(`✅ Mapped ${matched} SKEL bones to avatar skeleton`);
        document.getElementById('bone-count').textContent = matched + '/' + Object.keys(this.bones).length;
        
        // Update skeleton
        const boneArray = Object.values(this.bones);
        this.skeleton = new THREE.Skeleton(boneArray);
    }
    
    /**
     * Map MediaPipe landmarks to SKEL parameters
     */
    updateFromLandmarks(landmarks) {
        if (!landmarks) return;
        
        const lShoulder = landmarks[JOINT_INDICES.leftShoulder];
        const rShoulder = landmarks[JOINT_INDICES.rightShoulder];
        const lElbow = landmarks[JOINT_INDICES.leftElbow];
        const rElbow = landmarks[JOINT_INDICES.rightElbow];
        const lWrist = landmarks[JOINT_INDICES.leftWrist];
        const rWrist = landmarks[JOINT_INDICES.rightWrist];
        const lHip = landmarks[JOINT_INDICES.leftHip];
        const rHip = landmarks[JOINT_INDICES.rightHip];
        const lKnee = landmarks[JOINT_INDICES.leftKnee];
        const rKnee = landmarks[JOINT_INDICES.rightKnee];
        const lAnkle = landmarks[JOINT_INDICES.leftAnkle];
        const rAnkle = landmarks[JOINT_INDICES.rightAnkle];
        
        const spineCenter = this.midpoint(lShoulder, rShoulder);
        const hipCenter = this.midpoint(lHip, rHip);
        
        // Update root position
        if (hipCenter && this.bones.root) {
            const scale = 1.2;
            this.bones.root.position.x = hipCenter.x / scale;
            this.bones.root.position.y = hipCenter.y / scale + 0.5;
            this.bones.root.position.z = hipCenter.z / scale;
        }
        
        // Update arms
        this.updateArmChain('l', lShoulder, lElbow, lWrist);
        this.updateArmChain('r', rShoulder, rElbow, rWrist);
        
        // Update legs
        this.updateLegChain('l', lHip, lKnee, lAnkle);
        this.updateLegChain('r', rHip, rKnee, rAnkle);
        
        // Update spine
        if (hipCenter && spineCenter) {
            const spineDir = new THREE.Vector3(
                spineCenter.x - hipCenter.x,
                spineCenter.y - hipCenter.y,
                spineCenter.z - hipCenter.z
            ).normalize();
            
            const up = new THREE.Vector3(0, 1, 0);
            const quat = new THREE.Quaternion().setFromUnitVectors(up, spineDir);
            
            if (this.bones.spine1) {
                this.bones.spine1.quaternion.slerp(quat, 0.3);
            }
        }
    }
    
    updateArmChain(side, shoulder, elbow, wrist) {
        if (!shoulder || !elbow || !wrist) return;
        
        const prefix = side === 'l' ? 'l' : 'r';
        const upperArm = this.bones[prefix + 'UpperArm'];
        const forearm = this.bones[prefix + 'Forearm'];
        
        if (!upperArm || !forearm) return;
        
        const armDir = new THREE.Vector3(
            elbow.x - shoulder.x,
            elbow.y - shoulder.y,
            elbow.z - shoulder.z
        );
        const armLen = armDir.length();
        if (armLen < 0.001) return;
        armDir.normalize();
        
        const foreDir = new THREE.Vector3(
            wrist.x - elbow.x,
            wrist.y - elbow.y,
            wrist.z - elbow.z
        );
        const foreLen = foreDir.length();
        if (foreLen < 0.001) return;
        foreDir.normalize();
        
        const up = new THREE.Vector3(0, 1, 0);
        const quat = new THREE.Quaternion().setFromUnitVectors(up, armDir);
        upperArm.quaternion.slerp(quat, 0.3);
        
        // Elbow flexion - biomechanically constrained to 0-145 degrees
        const angle = Math.acos(Math.max(-1, Math.min(1, 
            armDir.x * foreDir.x + armDir.y * foreDir.y + armDir.z * foreDir.z
        )));
        const clampedAngle = Math.max(0, Math.min(145, angle * 180 / Math.PI));
        const rad = clampedAngle * Math.PI / 180;
        
        forearm.quaternion.setFromAxisAngle(
            new THREE.Vector3(1, 0, 0),
            rad * 0.5
        );
    }
    
    updateLegChain(side, hip, knee, ankle) {
        if (!hip || !knee || !ankle) return;
        
        const prefix = side === 'l' ? 'l' : 'r';
        const thigh = this.bones[prefix + 'Thigh'];
        const shin = this.bones[prefix + 'Shin'];
        
        if (!thigh || !shin) return;
        
        const legDir = new THREE.Vector3(
            knee.x - hip.x,
            knee.y - hip.y,
            knee.z - hip.z
        );
        const legLen = legDir.length();
        if (legLen < 0.001) return;
        legDir.normalize();
        
        const shinDir = new THREE.Vector3(
            ankle.x - knee.x,
            ankle.y - knee.y,
            ankle.z - knee.z
        );
        const shinLen = shinDir.length();
        if (shinLen < 0.001) return;
        shinDir.normalize();
        
        const up = new THREE.Vector3(0, -1, 0);
        const quat = new THREE.Quaternion().setFromUnitVectors(up, legDir);
        thigh.quaternion.slerp(quat, 0.3);
        
        // Knee flexion - biomechanically constrained to 0-150 degrees
        const angle = Math.acos(Math.max(-1, Math.min(1,
            legDir.x * shinDir.x + legDir.y * shinDir.y + legDir.z * shinDir.z
        )));
        const clampedAngle = Math.max(0, Math.min(150, angle * 180 / Math.PI));
        const rad = clampedAngle * Math.PI / 180;
        
        shin.quaternion.setFromAxisAngle(
            new THREE.Vector3(1, 0, 0),
            rad * 0.5
        );
    }
    
    midpoint(a, b) {
        if (!a || !b) return null;
        return new THREE.Vector3(
            (a.x + b.x) / 2,
            (a.y + b.y) / 2,
            (a.z + b.z) / 2
        );
    }
    
    groundFeet(floorY) {
        const lFoot = this.bones.lFoot;
        const rFoot = this.bones.rFoot;
        const lShin = this.bones.lShin;
        const rShin = this.bones.rShin;
        
        if (lFoot && lFoot.position.y < floorY + 0.05) {
            lFoot.position.y = floorY + 0.02;
            if (lShin) lShin.position.y -= 0.02;
        }
        if (rFoot && rFoot.position.y < floorY + 0.05) {
            rFoot.position.y = floorY + 0.02;
            if (rShin) rShin.position.y -= 0.02;
        }
    }
}

// ============================================================
// 3. THREE.JS SCENE SETUP
// ============================================================

function initScene() {
    const container = document.getElementById('container');
    
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a0a12);
    scene.fog = new THREE.FogExp2(0x0a0a12, 0.05);
    
    const width = window.innerWidth;
    const height = window.innerHeight;
    
    camera = new THREE.PerspectiveCamera(45, width / height, 0.1, 100);
    camera.position.set(2, 1.5, 3.5);
    
    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(width, height);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.2;
    container.appendChild(renderer.domElement);
    
    controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 1.0, 0);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;
    controls.update();
    
    // Lighting
    const ambient = new THREE.AmbientLight(0x404060, 0.5);
    scene.add(ambient);
    
    const key = new THREE.DirectionalLight(0xffffff, 1.5);
    key.position.set(5, 10, 5);
    key.castShadow = true;
    scene.add(key);
    
    const fill = new THREE.DirectionalLight(0x8888ff, 0.5);
    fill.position.set(-5, 5, -5);
    scene.add(fill);
    
    const rim = new THREE.DirectionalLight(0x60a5fa, 0.3);
    rim.position.set(0, 0, 10);
    scene.add(rim);
    
    // Ground
    const ground = new THREE.Mesh(
        new THREE.PlaneGeometry(20, 20),
        new THREE.MeshStandardMaterial({ color: 0x0a0a12, roughness: 0.8 })
    );
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = -0.01;
    ground.receiveShadow = true;
    scene.add(ground);
    
    // Grid
    const grid = new THREE.GridHelper(10, 20, 0x1e293b, 0x1e293b);
    grid.position.y = 0.001;
    scene.add(grid);
    
    // Create avatar
    avatar = new SKELAvatar(scene, false);
    document.getElementById('bone-count').textContent = Object.keys(avatar.bones).length;
    
    window.addEventListener('resize', onResize);
    animate();
}

function onResize() {
    const width = window.innerWidth;
    const height = window.innerHeight;
    camera.aspect = width / height;
    camera.updateProjectionMatrix();
    renderer.setSize(width, height);
}

function animate() {
    requestAnimationFrame(animate);
    controls.update();
    renderer.render(scene, camera);
}

// ============================================================
// 4. SKEL MESH LOADING
// ============================================================

function loadSKELMesh(event) {
    const file = event.target.files[0];
    if (!file) return;
    
    const reader = new FileReader();
    const extension = file.name.split('.').pop().toLowerCase();
    
    document.getElementById('status-text').textContent = 'Loading SKEL mesh...';
    document.getElementById('status-dot').className = 'dot yellow';
    
    const url = URL.createObjectURL(file);
    
    let loader;
    if (extension === 'fbx') {
        loader = new THREE.FBXLoader();
    } else {
        loader = new THREE.GLTFLoader();
    }
    
    loader.load(url, (result) => {
        let model;
        if (extension === 'fbx') {
            model = result;
        } else {
            model = result.scene;
        }
        
        // Scale the model appropriately
        const box = new THREE.Box3().setFromObject(model);
        const size = box.getSize(new THREE.Vector3());
        const maxDim = Math.max(size.x, size.y, size.z);
        if (maxDim > 0) {
            const targetHeight = 1.8;
            const scale = targetHeight / maxDim;
            model.scale.set(scale, scale, scale);
        }
        
        // Center the model
        const center = box.getCenter(new THREE.Vector3());
        model.position.set(-center.x * model.scale.x, -center.y * model.scale.y, -center.z * model.scale.z);
        
        if (avatar) {
            avatar.attachSKELMesh(model);
            skelMeshLoaded = true;
            document.getElementById('status-text').textContent = 'SKEL mesh loaded!';
            document.getElementById('status-dot').className = 'dot green';
        }
        
        URL.revokeObjectURL(url);
    }, undefined, (err) => {
        console.error('Failed to load SKEL mesh:', err);
        document.getElementById('status-text').textContent = 'Error loading mesh';
        document.getElementById('status-dot').className = 'dot red';
        URL.revokeObjectURL(url);
    });
}

// ============================================================
// 5. MEDIAPIPE INTEGRATION
// ============================================================

function initMediaPipe() {
    poseDetector = new Pose({
        locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`
    });
    poseDetector.setOptions({
        modelComplexity: 1,
        smoothLandmarks: true,
        enableSegmentation: false,
        minDetectionConfidence: 0.5,
        minTrackingConfidence: 0.5
    });
    poseDetector.onResults(onPoseResults);
}

function onPoseResults(results) {
    if (!results.poseWorldLandmarks) return;
    if (avatar) {
        avatar.updateFromLandmarks(results.poseWorldLandmarks);
        avatar.groundFeet(-0.01);
    }
}

function startPoseProcessing(videoElement) {
    if (processingLoop) return;
    processingLoop = true;
    
    async function processFrame() {
        if (!processingLoop) return;
        if (videoElement.readyState >= 2) {
            try {
                await poseDetector.send({ image: videoElement });
            } catch (e) {}
        }
        requestAnimationFrame(processFrame);
    }
    processFrame();
}

// ============================================================
// 6. WEBRTC / PEERJS CONNECTIVITY
// ============================================================

function startDisplay() {
    document.getElementById('setup-screen').classList.add('hidden');
    document.getElementById('hud').classList.add('active');
    document.getElementById('controls').classList.add('active');
    
    // Generate 5-digit code
    displayCode = Math.random().toString(36).substring(2, 7).toUpperCase();
    document.getElementById('display-code').textContent = displayCode;
    document.getElementById('status-text').textContent = 'Waiting for phone...';
    document.getElementById('status-dot').className = 'dot yellow';
    
    // Start PeerJS
    peerId = 'SKEL-' + displayCode;
    peer = new Peer(peerId);
    
    peer.on('open', () => {
        document.getElementById('status-text').textContent = 'Ready - Enter code on phone';
        document.getElementById('status-dot').className = 'dot blue';
    });
    
    peer.on('error', (err) => {
        console.error('Peer error:', err);
        document.getElementById('status-text').textContent = 'Error: ' + err.message;
        document.getElementById('status-dot').className = 'dot red';
    });
    
    peer.on('call', (call) => {
        document.getElementById('status-text').textContent = 'Phone connecting...';
        document.getElementById('status-dot').className = 'dot yellow';
        
        call.answer();
        activeCall = call;
        
        call.on('stream', (remoteStream) => {
            const videoEl = document.createElement('video');
            videoEl.srcObject = remoteStream;
            videoEl.autoplay = true;
            videoEl.playsInline = true;
            videoEl.muted = true;
            
            videoEl.onloadedmetadata = () => {
                videoEl.play();
                document.getElementById('status-text').textContent = 'Connected!';
                document.getElementById('status-dot').className = 'dot green';
                
                initMediaPipe();
                startPoseProcessing(videoEl);
            };
        });
        
        call.on('close', () => {
            document.getElementById('status-text').textContent = 'Disconnected';
            document.getElementById('status-dot').className = 'dot red';
            processingLoop = false;
        });
    });
    
    // Set up scene
    initScene();
    
    // Start FPS counter
    setInterval(updateFPS, 500);
}

function startCamera() {
    document.getElementById('setup-screen').classList.add('hidden');
    document.getElementById('phone-view').classList.add('active');
    
    // Focus the input
    setTimeout(() => document.getElementById('peer-code').focus(), 500);
    
    peer = new Peer();
    peer.on('error', (err) => {
        alert('Connection error: ' + err.message);
    });
}

function connectToDisplay() {
    const code = document.getElementById('peer-code').value.trim().toUpperCase();
    if (code.length !== 5) {
        alert('Please enter a 5-digit code');
        return;
    }
    
    const targetId = 'SKEL-' + code;
    document.getElementById('stream-status').textContent = 'Connecting to ' + targetId + '...';
    
    navigator.mediaDevices.getUserMedia({
        video: { facingMode: 'user', width: { ideal: 360 }, height: { ideal: 640 } },
        audio: false
    }).then(stream => {
        localStream = stream;
        document.getElementById('local-video').srcObject = stream;
        document.getElementById('phone-join').style.display = 'none';
        document.getElementById('phone-stream').style.display = 'block';
        
        const call = peer.call(targetId, stream);
        activeCall = call;
        
        call.on('close', () => {
            alert('Connection lost');
            disconnectStream();
        });
        
        document.getElementById('stream-status').textContent = 'Streaming to ' + targetId + ' ✅';
    }).catch(err => {
        alert('Camera access denied: ' + err.message);
    });
}

function disconnectStream() {
    if (localStream) {
        localStream.getTracks().forEach(t => t.stop());
        localStream = null;
    }
    if (activeCall) {
        activeCall.close();
        activeCall = null;
    }
    document.getElementById('phone-join').style.display = 'block';
    document.getElementById('phone-stream').style.display = 'none';
    document.getElementById('phone-view').classList.remove('active');
    document.getElementById('setup-screen').classList.remove('hidden');
}

// ============================================================
// 7. UTILITIES
// ============================================================

function updateFPS() {
    const fps = Math.round(frameCount / 0.5);
    document.getElementById('fps-display').textContent = fps;
    frameCount = 0;
}

// Override animate to count FPS
const originalAnimate = animate;
animate = function() {
    frameCount++;
    originalAnimate();
};

function resetApp() {
    processingLoop = false;
    if (localStream) {
        localStream.getTracks().forEach(t => t.stop());
        localStream = null;
    }
    if (activeCall) {
        activeCall.close();
        activeCall = null;
    }
    if (peer) {
        peer.destroy();
        peer = null;
    }
    
    document.getElementById('setup-screen').classList.remove('hidden');
    document.getElementById('phone-view').classList.remove('active');
    document.getElementById('hud').classList.remove('active');
    document.getElementById('controls').classList.remove('active');
    document.getElementById('display-code').textContent = '-----';
    document.getElementById('status-text').textContent = 'Ready';
    document.getElementById('status-dot').className = 'dot green';
    
    if (renderer) {
        renderer.dispose();
        const container = document.getElementById('container');
        while (container.firstChild) {
            container.removeChild(container.firstChild);
        }
    }
    scene = camera = renderer = controls = avatar = null;
    skelMeshLoaded = false;
}

// ============================================================
// 8. KEYBOARD SHORTCUTS
// ============================================================

document.addEventListener('keydown', (e) => {
    if (e.key === 'r' || e.key === 'R') resetApp();
    if (e.key === 'Enter' && document.getElementById('phone-view').classList.contains('active')) {
        connectToDisplay();
    }
});
